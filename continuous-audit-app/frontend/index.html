                </tbody>
              </table>
            </div>
          )}
        </>
      )}

      {/* ViewNameModal — create new view or rename existing */}
      {viewModal !== null && (
        <ViewNameModal
          initialTitle={viewModal === "new" ? "" : viewModal.title}
          isRename={viewModal !== "new"}
          onClose={()=>setViewModal(null)}
          onSave={async title => {
            if (viewModal === "new") {
              const r = await api.createDashView({title});
              await api.getDashViews().then(vs => {
                const fresh = Array.isArray(vs) ? vs : [];
                setViews(fresh);
                const created = fresh.find(v => v.view_id === r.view_id);
                if (created) setDashTab(`view:${created.view_id}`);
              }).catch(()=>{});
            } else {
              await api.updateDashView(viewModal.view_id, {title});
              loadViews();
            }
          }}
        />
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]       = useState(null);
  const [tests, setTests]     = useState([]);
  const [stats, setStats]     = useState({active:0,paused:0,under_review:0,cleared:0,flagged:0,error:0,by_alert:{}});
  const [statsView, setStatsView] = useState("current");  // 'current' | '30d'
  const [risks, setRisks]     = useState([]);
  const [areas, setAreas]     = useState([]);
  const [loading, setLoad]    = useState(true);
  const [page, setPage]       = useState("tests");
  const [collapsed, setCol]   = useState(false);
  const [editor, setEditor]   = useState(null);
  const [detail, setDetail]   = useState(null);
  const [saving, setSaving]   = useState(false);
  const [toasts, setToasts]   = useState([]);
  const [lastRef,  setLastRef]  = useState(null);
  const [running,       setRunning]       = useState(false);
  const [orchConfigured, setOrchConfigured] = useState(false);

  const toast = useCallback((msg,type="success")=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  async function loadAll() {
    setLoad(true);
    try {
      // Run independently so a stats failure doesn't blank the tests list
      const testsP = api.listTests().catch(e => { toast("Erro ao carregar testes: " + e.message, "error"); return []; });
      const statsP = api.getStats().catch(() => ({active:0,paused:0,under_review:0,cleared:0,flagged:0,error:0}));
      const [t, s] = await Promise.all([testsP, statsP]);
      setTests(Array.isArray(t) ? t : []);
      setStats(s);
      setLastRef(new Date());
    } catch(e) {
      toast(e.message.includes("timeout") ? "Warehouse iniciando, tente novamente" : "Erro: " + e.message, "error");
    } finally { setLoad(false); }
  }

  useEffect(()=>{
    api.getUser().then(setUser).catch(()=>{});
    req("GET", "/run-orchestrator").then(r => setOrchConfigured(r?.configured === true)).catch(()=>{});
    api.getRisks().then(r => {
      if (r?.error) {
        console.error("Risks API error:", r.error);
        setRisks({ error: r.error, data: [] });
      } else {
        setRisks(r);
      }
    }).catch(e => setRisks({ error: e.message, data: [] }));
    api.getAreas().then(r => {
      if (r?.error) {
        console.error("Areas API error:", r.error);
        setAreas({ error: r.error, data: [] });
      } else {
        setAreas(r);
      }
    }).catch(e => setAreas({ error: e.message, data: [] }));
    loadAll();
  },[]);

  async function handleSave(form, submit) {
    setSaving(true);
    try {
      form.test_id
        ? await api.editTest(form.test_id, form, submit)
        : await api.createTest(form, submit);
      // Close modal immediately on success, then reload in background
      setEditor(null);
      toast(submit
        ? `"${form.test_name}" submetido para revisão ✓`
        : `"${form.test_name}" salvo como rascunho`
      );
      loadAll(); // intentionally not awaited — modal already closed
    } catch(e) {
      toast(e.message || "Erro ao salvar teste", "error");
    } finally {
      setSaving(false);
    }
  }

  async function handleRunOrchestrator() {
    setRunning(true);
    try {
      const res = await req("POST", "/run-orchestrator");
      if (res.status === "not_configured") {
        toast("⚙️ " + res.message, "error");
      } else {
        toast(`▶ Orquestrador disparado — Run ID: ${res.run_id}`);
      }
    } catch(e) {
      toast("Erro ao disparar: " + e.message, "error");
    } finally {
      setRunning(false);
    }
  }

  async function doAction(fn, msg) {
    try {
      await fn();
      await loadAll();  // reload first so UI shows updated data
      toast(msg);
    } catch(e) {
      toast(e.message || "Erro inesperado", "error");
    }
  }

  const reviewCount = tests.filter(t=>["UNDER_REVIEW","PENDING_DELETE"].includes(t.status)).length;

  const STATS = [
    {key:"active",  label:"Ativos",          cls:"c-indigo"},
    {key:"paused",  label:"Pausados",         cls:"c-slate"},
    {key:"cleared", label:"Cleared (30d)",    cls:"c-emerald", sub:"sem materialização"},
    {key:"flagged", label:"Flagged (30d)",    cls:"c-rose",    sub:"risco materializado"},
    {key:"error",   label:"Errors (30d)",     cls:"c-orange",  sub:"falha de execução"},
  ];

  const NAV = [
    {id:"tests",  icon:"⊞", label:"Testes"},
    {id:"review", icon:"◉", label:"Revisão", badge: reviewCount||null},
    {id:"fp",     icon:"⚑", label:"Falsos Positivos"},
    {id:"dash",   icon:"◈", label:"Dashboard"},
  ];

  return (
    <>
      <div className="app">
        <aside className={`sidebar${collapsed?" collapsed":""}`}>
          <div className="sidebar-top">
            <button className="hamburger" onClick={()=>setCol(c=>!c)} title={collapsed?"Expandir menu":"Recolher menu"}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
            <div className="brand-text">
              <div className="brand-title">Auditoria Contínua</div>
            </div>
          </div>

          <nav className="nav">
            {NAV.map(n=>(
              <button key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>setPage(n.id)} title={collapsed?n.label:""}>
                <span className="nav-icon">{n.icon}</span>
                <span className="nav-label">{n.label}</span>
                {n.badge&&<span className="nav-badge">{n.badge}</span>}
              </button>
            ))}
          </nav>

          <div className="sidebar-footer">
            {user&&<div className="user-pill"><div className="user-email">{user.email}</div></div>}
          </div>
        </aside>

        <main className="main">
          <div className="topbar">
            <div className="topbar-title">{page==="tests"?"Testes de Auditoria":page==="review"?"Fila de Revisão":page==="fp"?"Falsos Positivos":"Dashboard"}</div>
            {lastRef&&<span className="topbar-meta">atualizado às {lastRef.toLocaleTimeString("pt-BR",{timeStyle:"short"})}</span>}
            <button className="btn btn-ghost btn-sm" onClick={loadAll} disabled={loading}>{loading?"⏳":"⟳"} Atualizar</button>
            {page==="tests"&&<button className="btn btn-ghost btn-sm" onClick={handleRunOrchestrator}
              disabled={running||!orchConfigured}
              title={orchConfigured?"Dispara o job do orquestrador no Databricks":"Configure ORCHESTRATOR_JOB_ID em app.yaml para habilitar"}
              style={!orchConfigured?{opacity:0.4,cursor:"not-allowed"}:{}}>
              {running?"⏳ Disparando…":"▶ Executar Testes"}
            </button>}
            {page==="tests"&&<button className="btn btn-primary" onClick={()=>setEditor({})}>+ Novo Teste</button>}
          </div>

          <div className="content">
            {page==="tests"&&(
              <>
                {/* Stats cards with toggle — statsView state lives in App */}
                {(()=>{
                  const ba = stats.by_alert || {};
                  const total30 = (stats.cleared||0)+(stats.flagged||0)+(stats.error||0);
                  const CURRENT_CARDS = [
                    {key:"sem_achados",  label:"Sem Achados",       icon:"✅", cls:"c-emerald", sub:"testes regulares"},
                    {key:"novo_achado",  label:"Novo Achado",        icon:"🆕", cls:"c-rose",    sub:"primeira materialização"},
                    {key:"persistente",  label:"Achado Persistente", icon:"🔁", cls:"c-orange",  sub:"sem resolução intermediária"},
                    {key:"reincidente",  label:"Risco Reincidente",  icon:"⚠️", cls:"c-rose",    sub:"voltou após resolução"},
                    {key:"em_tratamento",label:"Em Tratamento",      icon:"🔕", cls:"c-amber",   sub:"apontamento aberto"},
                    {key:"erro",         label:"Erro",               icon:"❌", cls:"c-slate",   sub:"falha de execução"},
                  ];
                  return (
                    <div style={{marginBottom:22}}>
                      {/* Toggle header */}
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                        <div style={{flex:1,height:1,background:"var(--border)"}}/>
                        <div style={{display:"flex",border:"1px solid var(--border)",borderRadius:"var(--rs)",overflow:"hidden"}}>
                          <button onClick={()=>setStatsView("current")}
                            style={{padding:"4px 14px",border:"none",fontSize:11,fontFamily:"var(--mono)",cursor:"pointer",
                              background:statsView==="current"?"var(--primary)":"transparent",
                              color:statsView==="current"?"#fff":"var(--text-muted)"}}>
                            Estado Atual
                          </button>
                          <button onClick={()=>setStatsView("30d")}
                            style={{padding:"4px 14px",border:"none",fontSize:11,fontFamily:"var(--mono)",cursor:"pointer",
                              background:statsView==="30d"?"var(--primary)":"transparent",
                              color:statsView==="30d"?"#fff":"var(--text-muted)"}}>
                            30 dias
                          </button>
                        </div>
                      </div>

                      {statsView==="current" ? (
                        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10}}>
                          {CURRENT_CARDS.map(c=>(
                            <div key={c.key} className={`stat-card ${c.cls}`}>
                              <div className="stat-label" style={{fontSize:9}}>{c.icon} {c.label}</div>
                              <div className="stat-val">{ba[c.key]??0}</div>
                              <div className="stat-sub">{c.sub}</div>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                          <div className="stat-card c-emerald">
                            <div className="stat-label">Sem Achados</div>
                            <div className="stat-val">{stats.cleared??0}</div>
                            <div className="stat-sub">{total30>0?`${stats.cleared??0} de ${total30} execuções`:"sem materialização"}</div>
                          </div>
                          <div className="stat-card c-rose">
                            <div className="stat-label">Com Achados</div>
                            <div className="stat-val">{stats.flagged??0}</div>
                            <div className="stat-sub">{total30>0?<><strong style={{color:"var(--danger)"}}>{stats.flagged??0} de {total30}</strong> execuções</>:"risco materializado"}</div>
                          </div>
                          <div className="stat-card c-orange">
                            <div className="stat-label">Erros</div>
                            <div className="stat-val">{stats.error??0}</div>
                            <div className="stat-sub">{total30>0?`${stats.error??0} de ${total30} execuções`:"falha de execução"}</div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}
                <TestList tests={tests} loading={loading} onSelect={setDetail} onNew={()=>setEditor({})}/>
              </>
            )}
            {page==="review"&&<ReviewQueue tests={tests} user={user} loading={loading} onApprove={t=>doAction(()=>api.approve(t.test_id),`"${t.test_name}" aprovado ✓`)} onReject={(t,r)=>doAction(()=>api.reject(t.test_id,r),`"${t.test_name}" rejeitado`)}/>}
            {page==="fp"&&<FalsePositivesPage onOpenTest={testId=>{
              const t = tests.find(x=>x.test_id===testId);
              if (t) { setPage("tests"); setDetail(t); }
            }}/>}
            {page==="dash"&&<Dashboard tests={tests} areas={areas}/>}
          </div>
        </main>
      </div>

      {editor!==null&&<TestEditor test={editor?.test_id?editor:null} risks={risks} areas={areas} onClose={()=>setEditor(null)} onSave={handleSave} saving={saving}/>}

      {detail&&<TestDetail test={detail} user={user} onClose={()=>setDetail(null)} onEdit={t=>{setDetail(null);setEditor(t);}} onPause={t=>doAction(()=>api.pause(t.test_id),`"${t.test_name}" pausado`)} onActivate={t=>doAction(()=>api.activate(t.test_id),`"${t.test_name}" reativado ✓`)} onRequestDelete={(t,reason)=>doAction(()=>api.requestDelete(t.test_id,reason),`Solicitação de exclusão enviada para revisão`)}/>}

      <Toasts toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

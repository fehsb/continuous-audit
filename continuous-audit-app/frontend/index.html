// ── AchadosModal ──────────────────────────────────────────────────────────────
function AchadosModal({testId, testName, execDates, onClose}) {
  const [dateFrom, setDateFrom] = useState(execDates[0]||"");
  const [dateTo,   setDateTo]   = useState("");
  const [search,   setSearch]   = useState("");
  const [data,     setData]     = useState(null);
  const [loading,  setLoad]     = useState(false);
  const [expanded, setEx]       = useState(null);
  const [allDates, setAllDates] = useState(execDates);
  const [fpActing,    setFpActing]    = useState(null);
  const [fpMarkRow,   setFpMarkRow]   = useState(null);
  const [fpUnmarkRow, setFpUnmarkRow] = useState(null);

  function loadData(from, to) {
    setLoad(true); setEx(null);
    api.getIncidents(testId, {date_from:from||"", date_to:to||""})
      .then(d=>{ setData(d); setAllDates(d.exec_dates||allDates); setLoad(false); })
      .catch(e=>{ setData({error:e.message}); setLoad(false); });
  }

  useEffect(()=>{ loadData(dateFrom, dateTo); }, []);

  async function doMarkFP(row, note, criteria) {
    setFpMarkRow(null);
    setFpActing(row._row_hash);
    // Strip internal fields — only send business data as row_data (reference)
    const row_data = Object.fromEntries(
      Object.entries(row).filter(([k]) => !k.startsWith("_") && k !== "ArchiveDate")
    );
    try {
      await api.markFP({test_name: testName, match_criteria: criteria, note,
                        row_hash: row._row_hash, row_data});
    } catch(e) {}
    setFpActing(null);
    loadData(dateFrom, dateTo);
  }

  async function doUnmarkFP(row) {
    setFpUnmarkRow(null);
    setFpActing(row._row_hash);
    try {
      // The matched FP id is attached to the row by the backend
      if (row._fp_id) await api.unmarkFP(row._fp_id);
    } catch(e) {}
    setFpActing(null);
    loadData(dateFrom, dateTo);
  }

  const displayCols = (data?.columns||[]).filter(c=>c!=="ArchiveDate");
  const fp_count    = data?.fp_count || 0;

  const filtered = (data?.rows||[]).filter(row => {
    if (!search.trim()) return true;
    const q = search.toLowerCase();
    return displayCols.some(c => String(row[c]??"").toLowerCase().includes(q));
  });

  return (
    <>
    <div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()} style={{zIndex:200}}>
      <div className="modal modal-xl" style={{maxHeight:"95vh"}}>
        <div className="modal-head">
          <div style={{flex:1}}>
            <div className="modal-title">🔍 Achados — {testName}</div>
            <div className="modal-sub">
              {data?.count!=null && `${filtered.length} de ${data.count} registro(s)`}
              {data?.count>500 && " · mostrando primeiros 500"}
              {fp_count>0 && ` · ${fp_count} FP excluído${fp_count>1?"s":""}`}
            </div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        {/* Filters bar */}
        <div style={{display:"flex",gap:12,padding:"12px 22px",borderBottom:"1px solid var(--border)",background:"var(--surface-alt)",flexWrap:"wrap",alignItems:"flex-end"}}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontFamily:"var(--mono)",fontSize:10,textTransform:"uppercase",letterSpacing:".6px",color:"var(--text-muted)"}}>Execução</span>
            <select className="field-select" style={{minWidth:160}} value={dateFrom} onChange={e=>{setDateFrom(e.target.value);}}>
              <option value="">Todas as datas</option>
              {allDates.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontFamily:"var(--mono)",fontSize:10,textTransform:"uppercase",letterSpacing:".6px",color:"var(--text-muted)"}}>De</span>
            <input type="date" className="field-input" style={{width:140}} value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <span style={{fontFamily:"var(--mono)",fontSize:10,textTransform:"uppercase",letterSpacing:".6px",color:"var(--text-muted)"}}>Até</span>
            <input type="date" className="field-input" style={{width:140}} value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          </div>
          <button className="btn btn-primary btn-sm" onClick={()=>loadData(dateFrom,dateTo)} disabled={loading}>
            {loading?"⏳":"⟳"} Buscar
          </button>
          <div style={{marginLeft:"auto"}}>
            <input className="inp-search" placeholder="🔍 Buscar em todos os campos..." style={{width:240}} value={search} onChange={e=>{setSearch(e.target.value);setEx(null);}}/>
          </div>
          {search && (
            <button className="btn btn-ghost btn-sm" onClick={()=>setSearch("")}>✕ Limpar busca</button>
          )}
        </div>

        <div className="modal-body" style={{padding:0}}>
          {/* Hash comparison banner */}
          {!loading && data?.is_same_as_previous && (
            <div className="alert alert-warn" style={{margin:"12px 22px 0",fontSize:12}}>
              🔄 <strong>Achado Persistente — mesmas incidências da execução anterior.</strong>
              {data?.last_hash_meta?.is_suppressed ? " Alerta silenciado — apontamento de risco em tratamento vinculado ao teste." : " Nenhum novo alerta disparado — risco persistente em monitoramento."}
            </div>
          )}
          {!loading && fp_count>0 && (
            <div className="alert alert-info" style={{margin:"12px 22px 0",fontSize:12}}>
              ⚑ <strong>{fp_count} linha{fp_count>1?"s marcadas":" marcada"} como Falso Positivo</strong> — excluída{fp_count>1?"s":""} da contagem de achados e do threshold de alerta. Linhas marcadas aparecem com opacidade reduzida.
            </div>
          )}
          {loading ? (
            <div className="loading"><div className="spinner"/>Carregando achados...</div>
          ) : data?.error ? (
            <div style={{padding:24}}><div className="val-error">{data.error}</div></div>
          ) : filtered.length===0 ? (
            <div className="empty"><div className="empty-icon">🔎</div><div className="empty-title">{search?"Nenhum resultado para a busca":"Sem achados no período"}</div></div>
          ) : (
            <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"calc(95vh - 220px)"}}>
              <table style={{minWidth:"max-content"}}>
                <thead style={{position:"sticky",top:0,zIndex:10,background:"var(--surface-alt)"}}>
                  <tr>
                    <th style={{width:32}}/>
                    <th style={{whiteSpace:"nowrap",minWidth:90,background:"var(--surface-alt)"}}>FP</th>
                    <th style={{whiteSpace:"nowrap",minWidth:130,background:"var(--surface-alt)"}}>Data Execução</th>
                    {displayCols.map(c=>(
                      <th key={c} style={{whiteSpace:"nowrap",minWidth:120,background:"var(--surface-alt)"}}>{c}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((row,i)=>(
                    <React.Fragment key={i}>
                      <tr className={`achados-row${expanded===i?" expanded":""}`}
                          style={row._is_false_positive ? {opacity:0.5,background:"#fffbeb"} : {}}
                          onClick={()=>setEx(expanded===i?null:i)}>
                        <td style={{padding:"6px",textAlign:"center",color:"var(--text-subtle)",fontSize:11,cursor:"pointer"}}>{expanded===i?"▾":"▸"}</td>
                        <td onClick={e=>e.stopPropagation()} style={{textAlign:"center",padding:"4px 8px",whiteSpace:"nowrap"}}>
                          {row._is_false_positive ? (
                            <button
                              className="btn btn-xs btn-warning"
                              disabled={fpActing===row._row_hash}
                              onClick={()=>setFpUnmarkRow(row)}
                              title={`FP: ${row._fp_note||""} · Por ${row._fp_marked_by||"?"}`}
                            >
                              {fpActing===row._row_hash?"⏳":"FP ✓"}
                            </button>
                          ) : (
                            <button
                              className="btn btn-xs btn-ghost"
                              style={{opacity:0.55}}
                              disabled={fpActing===row._row_hash}
                              onClick={()=>setFpMarkRow(row)}
                              title="Marcar como falso positivo"
                            >
                              {fpActing===row._row_hash?"⏳":"FP"}
                            </button>
                          )}
                        </td>
                        <td className="cell-mono" style={{whiteSpace:"nowrap"}}>{row.ArchiveDate ? fmt(row.ArchiveDate) : "—"}</td>
                        {displayCols.map(c=>{
                          const v = String(row[c]??"");
                          const isMatch = search && v.toLowerCase().includes(search.toLowerCase());
                          return (
                            <td key={c} style={{whiteSpace:"nowrap",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",fontFamily:"var(--mono)",fontSize:12}} title={v}>
                              {isMatch ? (
                                <span style={{background:"#fef9c3",borderRadius:2,padding:"0 2px"}}>{v}</span>
                              ) : v}
                            </td>
                          );
                        })}
                      </tr>
                      {expanded===i&&(
                        <tr>
                          <td colSpan={displayCols.length+3} className="achados-expand">
                            {row._is_false_positive && (
                              <div style={{background:"#fffbeb",border:"1px solid #f59e0b",borderRadius:6,padding:"8px 12px",marginBottom:10,fontSize:12}}>
                                <strong>⚑ Falso Positivo</strong>
                                {row._fp_note && <> — {row._fp_note}</>}
                                <span style={{color:"var(--text-muted)",marginLeft:8}}>
                                  Por {row._fp_marked_by||"?"}{row._fp_marked_at ? ` em ${fmt(row._fp_marked_at)}` : ""}
                                </span>
                              </div>
                            )}
                            <div className="achados-inner" style={{gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))"}}>
                              {row.ArchiveDate && (
                                <div className="achado-field">
                                  <span className="achado-lbl">Data de Execução</span>
                                  <span className="achado-val">{fmt(row.ArchiveDate)}</span>
                                </div>
                              )}
                              {displayCols.map(c=>(
                                <div key={c} className="achado-field">
                                  <span className="achado-lbl">{c}</span>
                                  <span className="achado-val" style={{wordBreak:"break-word",lineHeight:1.5}}>{String(row[c]??"—")}</span>
                                </div>
                              ))}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
    {fpMarkRow && <FPMarkModal row={fpMarkRow} columns={displayCols}
      onConfirm={(note,criteria)=>doMarkFP(fpMarkRow,note,criteria)} onClose={()=>setFpMarkRow(null)}/>}
    {fpUnmarkRow && <FPUnmarkConfirm onConfirm={()=>doUnmarkFP(fpUnmarkRow)} onClose={()=>setFpUnmarkRow(null)}/>}
    </>
  );
}

// ── SuppressionTab ───────────────────────────────────────────────────────────
function SuppressionTab({testId, testName}) {
  const [suppressions, setSuppressions] = useState(null);
  const [showAdd, setShowAdd]           = useState(false);
  const [entryQ, setEntryQ]             = useState("");
  const [entries, setEntries]           = useState([]);
  const [selected, setSelected]         = useState(null);
  const [note, setNote]                 = useState("");
  const [saving, setSaving]             = useState(false);
  const [acting, setActing]             = useState(null);
  const entryRef = useRef();

  function load() {
    api.listSuppressions(testId)
      .then(r => setSuppressions(Array.isArray(r) ? r : r?.data || []))
      .catch(() => setSuppressions([]));
  }

  useEffect(load, [testId]);

  useEffect(() => {
    if (!entryQ.trim()) { setEntries([]); return; }
    const t = setTimeout(() => {
      api.searchEntries(entryQ, true)
        .then(r => setEntries(Array.isArray(r) ? r : r?.data || []))
        .catch(() => setEntries([]));
    }, 300);
    return () => clearTimeout(t);
  }, [entryQ]);

  async function addSuppression() {
    if (!selected) return;
    setSaving(true);
    await api.createSuppression(testId, {
      linked_entry_id:    selected.RiskEntryId,
      linked_entry_title: selected.RiskEntryTitle,
      note,
    });
    setSaving(false);
    setShowAdd(false); setEntryQ(""); setSelected(null); setNote("");
    load();
  }

  async function deactivate(sid) {
    setActing(sid);
    await api.deleteSuppress(sid);
    setActing(null);
    load();
  }

  if (suppressions === null)
    return <div className="loading"><div className="spinner"/>Carregando supressões...</div>;

  const active   = suppressions.filter(s => s.active && s.entry_is_open);
  const inactive = suppressions.filter(s => !s.active || !s.entry_is_open);

  return (
    <div>
      {/* Info box */}
      <div className="alert alert-info" style={{marginBottom:14}}>
        <strong>Apontamento em Tratamento</strong> — enquanto um apontamento de risco aberto estiver vinculado, o teste continua rodando e gravando achados mas não dispara notificação (aparece como "Em Tratamento" no histórico).
        O teste continua rodando e gravando achados — apenas não dispara notificação.
        Quando o apontamento fechar, o teste volta a alertar automaticamente.
      </div>

      {/* Active suppressions */}
      {active.length > 0 && (
        <div style={{marginBottom:16}}>
          <div className="sec-title">Apontamentos em Tratamento Ativos</div>
          {active.map(s => (
            <div key={s.suppression_id} style={{
              border:"1px solid var(--warning-b)", borderRadius:"var(--rs)",
              padding:"12px 14px", marginBottom:10, background:"var(--warning-soft)"
            }}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13}}>
                    🔕 {s.linked_entry_id}
                    {s.entry_criticality && <span className="badge badge-review" style={{marginLeft:8,fontSize:10}}>{s.entry_criticality}</span>}
                  </div>
                  <div style={{fontSize:12.5,color:"var(--text-muted)",marginTop:2}}>{s.entry_title||s.linked_entry_title}</div>
                  {s.note && <div style={{fontSize:12,color:"var(--text-subtle)",marginTop:4,fontStyle:"italic"}}>"{s.note}"</div>}
                  <div style={{fontSize:11,color:"var(--text-subtle)",marginTop:4}}>Criado por {s.created_by} · {fmt(s.created_at)}</div>
                </div>
                <button className="btn btn-ghost btn-sm" disabled={acting===s.suppression_id} onClick={()=>deactivate(s.suppression_id)}>
                  {acting===s.suppression_id?"...":"Desativar"}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Add suppression */}
      {!showAdd ? (
        <button className="btn btn-warning btn-sm" onClick={()=>setShowAdd(true)}>
          + Vincular Apontamento em Tratamento
        </button>
      ) : (
        <div style={{border:"1px solid var(--border)",borderRadius:"var(--rs)",padding:"16px",background:"var(--surface-alt)"}}>
          <div className="sec-title">Vincular Apontamento de Risco em Tratamento</div>

          <div className="field" style={{marginBottom:12}} ref={entryRef}>
            <label className="field-label">Buscar Apontamento Aberto (GRCAP-...)<span className="req">*</span></label>
            <div style={{position:"relative"}}>
              <input
                className="field-input"
                placeholder="Buscar por ID (GRCAP-...) ou título..."
                value={entryQ}
                onChange={e=>{setEntryQ(e.target.value);setSelected(null);}}
              />
              {entries.length>0 && !selected && (
                <div className="cb-dropdown">
                  {entries.map(e=>(
                    <div key={e.RiskEntryId} className="cb-item" onMouseDown={()=>{setSelected(e);setEntryQ(`${e.RiskEntryId} — ${e.RiskEntryTitle}`);}}>
                      <span style={{fontFamily:"var(--mono)",fontSize:10.5,color:"var(--primary)",marginRight:8}}>{e.RiskEntryId}</span>
                      <span>{e.RiskEntryTitle}</span>
                      {e.Criticality&&<span style={{marginLeft:"auto",fontSize:10.5,color:"var(--text-subtle)"}}>{e.Criticality}</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {selected && (
              <div style={{marginTop:6,padding:"8px 12px",background:"var(--primary-soft)",borderRadius:"var(--rs)",fontSize:12}}>
                ✓ <strong>{selected.RiskEntryId}</strong> — {selected.RiskEntryTitle}
                {selected.ImplementationDeadline&&<span style={{marginLeft:8,color:"var(--text-muted)"}}>Prazo: {selected.ImplementationDeadline}</span>}
              </div>
            )}
          </div>

          <div className="field" style={{marginBottom:14}}>
            <label className="field-label">Observação</label>
            <textarea className="field-textarea" rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder="Contexto ou justificativa..."/>
          </div>

          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-warning" onClick={addSuppression} disabled={!selected||saving}>
              {saving?"Salvando...":"Salvar Supressão"}
            </button>
            <button className="btn btn-ghost" onClick={()=>{setShowAdd(false);setEntryQ("");setSelected(null);setNote("");}}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {/* Inactive history */}
      {inactive.length > 0 && (
        <div style={{marginTop:20}}>
          <div className="sec-title">Histórico (apontamentos fechados ou desativados)</div>
          {inactive.map(s => (
            <div key={s.suppression_id} style={{
              border:"1px solid var(--border)", borderRadius:"var(--rs)",
              padding:"10px 14px", marginBottom:8, opacity:.6
            }}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:500,fontSize:13}}>{s.linked_entry_id}</span>
                {!s.entry_is_open
                  ? <span className="badge badge-cleared" style={{fontSize:10}}>✓ Apontamento Fechado</span>
                  : <span className="badge badge-cancelled" style={{fontSize:10}}>Desativado Manualmente</span>
                }
              </div>
              <div style={{fontSize:12,color:"var(--text-muted)",marginTop:2}}>{s.entry_title||s.linked_entry_title}</div>
              {!s.entry_is_open && s.entry_closing_date && (
                <div style={{fontSize:11,color:"var(--success)",marginTop:3}}>
                  ✓ Fechado em {s.entry_closing_date} — teste voltou a alertar normalmente
                </div>
              )}
              {s.entry_is_open && (
                <div style={{fontSize:11,color:"var(--text-subtle)",marginTop:3}}>
                  Desativado manualmente — apontamento ainda está aberto
                </div>
              )}
              <div style={{fontSize:11,color:"var(--text-subtle)",marginTop:2}}>
                Criado por {s.created_by} · {fmt(s.created_at)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── TestDetail ────────────────────────────────────────────────────────────────
function TestDetail({test, user, onClose, onEdit, onPause, onActivate, onRequestDelete}) {
  const [tab, setTab]       = useState("info");
  const [history, setHist]  = useState(null);  // null = not loaded
  const [execs, setExecs]   = useState(null);
  const [acting, setActing] = useState(false);

  useEffect(()=>{ if(tab==="history"&&history===null)    api.getHistory(test.test_id).then(setHist).catch(()=>setHist([])); },[tab]);
  useEffect(()=>{ if(tab==="executions"&&execs===null)   api.getExecutions(test.test_id).then(setExecs).catch(()=>setExecs([])); },[tab]);

  const canEdit   = ["DRAFT","REJECTED","ACTIVE"].includes(test.status);
  const isActiveLocked = test.status === "ACTIVE";
  const canDelete = ["ACTIVE","PAUSED","REJECTED","DRAFT"].includes(test.status);
  const [confirmDelete, setConfirmDelete] = useState(false);

  return (
    <>
    <div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-xl">
        <div className="modal-head">
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:5,flexWrap:"wrap"}}>
              <div className="modal-title">{test.test_name}</div>
              <StatusBadge s={acting ? "LOADING" : test.status}/><TypeBadge t={test.query_type}/>
            </div>
            <div className="modal-sub">v{test.version} · {test.category||"sem categoria"} · criado por {test.created_by}</div>
          </div>
          <div style={{display:"flex",gap:7,flexShrink:0}}>
            {test.status==="ACTIVE" && (
              <button className="btn btn-warning btn-sm" disabled={acting} onClick={async()=>{
                setActing(true);
                await onPause(test);
                setActing(false);
                onClose();
              }}>
                {acting ? <><div className="spinner" style={{width:12,height:12,borderWidth:1.5}}/> Pausando...</> : "⏸ Pausar"}
              </button>
            )}
            {test.status==="PAUSED" && (
              <button className="btn btn-success btn-sm" disabled={acting} onClick={async()=>{
                setActing(true);
                await onActivate(test);
                setActing(false);
                onClose();
              }}>
                {acting ? <><div className="spinner" style={{width:12,height:12,borderWidth:1.5}}/> Reativando...</> : "▶ Reativar"}
              </button>
            )}
            {canEdit                 && <button className="btn btn-ghost btn-sm"   onClick={()=>{onClose();onEdit(test);}}>✎ {test.status==="ACTIVE"?"Editar":"Editar"}</button>}
            {canDelete               && <button className="btn btn-danger btn-sm"  onClick={()=>setConfirmDelete(true)}>🗑 Excluir</button>}
            <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
          </div>
        </div>
        <div className="tabs">
          {[["info","Informações"],["query","Query"],["executions","Execuções"],["achados","Achados"],["suppressions","Em Tratamento"],["history","Histórico"]].map(([id,lbl])=>(
            <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
          ))}
        </div>
        <div className="modal-body">
          {tab==="info"&&(
            <>
              <div className="sec-title">Configuração</div>
              <div className="kv-grid" style={{marginBottom:18}}>
                <div className="kv-item"><span className="kv-lbl">Área Responsável</span><span className="kv-val">{test.responsible_area||"—"}</span></div>
                <div className="kv-item"><span className="kv-lbl">ID do Risco</span><span className="kv-val">{test.risco_id||"—"}</span></div>
                <div className="kv-item"><span className="kv-lbl">Threshold</span><span className="kv-val">{test.threshold}</span></div>
                <div className="kv-item"><span className="kv-lbl">Frequência</span><span className="kv-val">{test.frequency}</span></div>
                <div className="kv-item"><span className="kv-lbl">Notificação</span><span className="kv-val">{test.should_activate_channel?"🔔 Ativa":"🔕 Inativa"}</span></div>
                <div className="kv-item"><span className="kv-lbl">Ativado em</span><span className="kv-val">{fmt(test.activated_at)}</span></div>
                <div className="kv-item" style={{gridColumn:"span 3"}}><span className="kv-lbl">Tabela de Achados</span><span className="kv-val" style={{fontFamily:"var(--mono)",fontSize:11}}>sandbox.grc.{test.output_table}</span></div>
              </div>
              {test.description&&<><div className="sec-title">Descrição</div><p style={{fontSize:13,color:"var(--text-muted)",lineHeight:1.65,marginBottom:18}}>{test.description}</p></>}
              {test.rejection_reason&&<><div className="divider"/><div className="sec-title" style={{color:"var(--danger)"}}>Motivo da Rejeição</div><p style={{color:"var(--danger)",fontSize:13}}>{test.rejection_reason}</p></>}
            </>
          )}
          {tab==="query"&&(
            <>
              {test.query_type==="PYTHON"&&test.imports&&<><div className="sec-title">Imports</div><div className="code-preview imports" style={{marginBottom:14}}>{test.imports}</div></>}
              <div className="sec-title">{test.query_type==="SQL"?"Query SQL":"Código Python"}</div>
              <div className="code-preview query" style={{minHeight:200}}>{test.query_code||"— sem código —"}</div>
            </>
          )}
          {tab==="executions"&&(
            execs===null
              ? <div className="loading"><div className="spinner"/>Carregando execuções...</div>
              : execs.length===0
                ? <div className="empty"><div className="empty-title">Sem execuções registradas</div></div>
                : <ExecTable execs={execs}/>
          )}
          {tab==="achados"&&<AchadosTab testId={test.test_id} testName={test.test_name}/>}
          {tab==="suppressions"&&<SuppressionTab testId={test.test_id} testName={test.test_name}/>}
          {tab==="history"&&(
            history===null
              ? <div className="loading"><div className="spinner"/>Carregando histórico...</div>
              : history.length===0
                ? <div className="empty"><div className="empty-title">Sem histórico</div></div>
                : <div className="timeline">
                    {history.map((h,i)=>{
                      const neg=["REJECTED","CANCELLED"].includes(h.change_type);
                      const warn=["PAUSED"].includes(h.change_type);
                      return (
                        <div className="tl-item" key={i}>
                          <div className={`tl-dot${neg?" neg":warn?" warn":""}`}/>
                          <div className="tl-row">
                            <span className={`tl-type${neg?" neg":warn?" warn":""}`}>{CHG_LBL[h.change_type]||h.change_type}</span>
                            <span className="tl-date">{fmt(h.changed_at)}</span>
                          </div>
                          <div className="tl-by">por {h.changed_by}</div>
                          {h.comment&&<div className="tl-comment">"{h.comment}"</div>}
                        </div>
                      );
                    })}
                  </div>
          )}
        </div>
      </div>
    </div>
    {confirmDelete&&<ConfirmDeleteDialog test={test} onConfirm={reason=>{setConfirmDelete(false);onRequestDelete(test,reason);}} onCancel={()=>setConfirmDelete(false)}/>}
    </>
  );
}

// ── ConfirmDeleteDialog ──────────────────────────────────────────────────────
function ConfirmDeleteDialog({test, onConfirm, onCancel}) {
  const [reason, setReason] = useState("");
  const needsApproval = ["ACTIVE","PAUSED"].includes(test.status);

  return (
    <div className="overlay" style={{zIndex:300}} onMouseDown={e=>e.target===e.currentTarget&&onCancel()}>
      <div className="modal" style={{width:480}}>
        <div className="modal-head">
          <div>
            <div className="modal-title" style={{color:"var(--danger)"}}>
              {needsApproval?"🗑 Solicitar Exclusão":"🗑 Cancelar Teste"}
            </div>
            <div className="modal-sub">{test.test_name}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          {needsApproval ? (
            <div className="alert alert-warn" style={{marginBottom:16}}>
              ⚠️ Este teste está <strong>{test.status === "ACTIVE" ? "ativo" : "pausado"}</strong>. A exclusão precisará de aprovação de outro revisor antes de ser efetivada.
            </div>
          ) : (
            <div className="alert alert-warn" style={{marginBottom:16}}>
              Esta ação cancelará o teste imediatamente. O histórico e os achados registrados serão preservados.
            </div>
          )}
          <div className="field">
            <label className="field-label">Justificativa<span className="req">*</span></label>
            <textarea
              className="field-textarea" rows={3}
              value={reason}
              onChange={e=>setReason(e.target.value)}
              placeholder="Descreva o motivo da exclusão..."
              autoFocus
            />
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onCancel}>Cancelar</button>
          <button
            className="btn btn-danger"
            onClick={()=>reason.trim()&&onConfirm(reason)}
            disabled={!reason.trim()}
          >
            {needsApproval?"Solicitar Exclusão":"Confirmar Cancelamento"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── RunPreviewInline ──────────────────────────────────────────────────────────
function RunPreviewInline({test}) {
  const [preview,  setPreview]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [open,     setOpen]     = useState(false);

  async function run() {
    setOpen(true);
    setLoading(true);
    const r = await api.runPreview({
      query_type: test.query_type,
      imports:    test.imports,
      query_code: test.query_code,
    });
    setPreview(r);
    setLoading(false);
  }

  return (
    <div style={{border:"1px solid var(--border)",borderRadius:"var(--rs)",overflow:"hidden",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"var(--surface-alt)"}}>

          {loading?"⏳ Executando...":open?"▲ Fechar resultado":"▶ Testar Query"}
        </button>
        {preview?.success===true  && !loading && <span style={{color:"var(--success)",fontSize:12,fontWeight:500}}>✓ Query OK</span>}
        {preview?.success===false && !loading && <span style={{color:"var(--danger)",fontSize:12,fontWeight:500}}>✗ Erro encontrado</span>}

        loading ? (
          <div style={{padding:"14px",display:"flex",gap:8,color:"var(--text-muted)",fontSize:13}}><div className="spinner"/>Executando no warehouse...</div>
        ) : preview?.success ? (
          <div style={{padding:"12px 14px"}}>
            {preview.sample !== undefined ? (
              <>
                <div style={{fontWeight:600,fontSize:12,color:"var(--success)",marginBottom:8}}>
                  ✓ {preview.row_count===0?"0 linhas — sem achados no momento":`${preview.row_count} linha(s) — df_incidents`}

function parseRowData(rowDataStr) {
  if (!rowDataStr) return [];
  try {
    const obj = JSON.parse(rowDataStr);
    return Object.entries(obj).filter(([,v]) => v != null && v !== "");
  } catch(e) { return []; }
}

function parseCriteria(raw) {
  if (!raw) return [];
  try {
    const arr = typeof raw === "string" ? JSON.parse(raw) : raw;
    return Array.isArray(arr) ? arr : [];
  } catch(e) { return []; }
}

function CriteriaChips({criteria}) {
  const parsed = parseCriteria(criteria);
  if (parsed.length === 0) {
    return <span style={{fontSize:12,color:"var(--text-subtle)",fontStyle:"italic"}}>
      Correspondência por linha completa (FP legado)
    </span>;
  }
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
      {parsed.map((c,i)=>(
        <React.Fragment key={i}>
          {i>0 && <span style={{color:"var(--primary)",fontWeight:700,fontSize:11}}>E</span>}
          <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,
            background:"var(--surface)",border:"1px solid var(--border)",borderRadius:20,padding:"2px 10px"}}>
            <span style={{fontFamily:"var(--mono)",color:"var(--text-muted)"}}>{c.column}</span>
            <span style={{color:"var(--text-subtle)"}}>=</span>
            <span style={{fontFamily:"var(--mono)",fontWeight:600}}>{c.value===""||c.value==null?"(vazio)":String(c.value)}</span>
          </span>
        </React.Fragment>
      ))}
    </div>
  );
}

function RowExpandPanel({criteria, rowDataStr, colSpan}) {
  const entries = parseRowData(rowDataStr);
  return (
    <tr>
      <td colSpan={colSpan} style={{padding:0,borderBottom:"1px solid var(--border)"}}>
        <div style={{padding:"12px 20px",background:"#fafbff"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:9.5,textTransform:"uppercase",
                       letterSpacing:".4px",color:"var(--text-subtle)",marginBottom:7}}>
            Critérios de correspondência
          </div>
          <div style={{marginBottom:entries.length?16:0}}>
            <CriteriaChips criteria={criteria}/>
          </div>
          {entries.length > 0 && (
            <>
              <div style={{fontFamily:"var(--mono)",fontSize:9.5,textTransform:"uppercase",
                           letterSpacing:".4px",color:"var(--text-subtle)",marginBottom:7}}>
                Achado de origem
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"10px 16px"}}>
                {entries.map(([k,v]) => (
                  <div key={k} style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span style={{fontFamily:"var(--mono)",fontSize:9.5,textTransform:"uppercase",
                                  letterSpacing:".4px",color:"var(--text-subtle)"}}>{k}</span>
                    <span style={{fontSize:12.5,color:"var(--text)",wordBreak:"break-word",lineHeight:1.5}}>
                      {String(v)}
                    </span>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </td>
    </tr>
  );
}

// ── ReviewQueue ───────────────────────────────────────────────────────────────
function ReviewQueue({tests, user, onApprove, onReject, loading}) {
  const [rejectId, setRid] = useState(null);
  const [reason, setReason]= useState("");
  const [acting, setActing]= useState(null);
  const queue = tests.filter(t=>["UNDER_REVIEW","PENDING_DELETE"].includes(t.status));

  async function doApprove(t){setActing(t.test_id);await onApprove(t);setActing(null);}
  async function doReject(t){if(!reason.trim())return;setActing(t.test_id);await onReject(t,reason);setRid(null);setReason("");setActing(null);}

  if(loading) return <div className="loading"><div className="spinner"/>Carregando...</div>;
  if(!queue.length) return <div className="empty" style={{marginTop:40}}><div className="empty-icon">✅</div><div className="empty-title">Fila vazia</div><div className="empty-sub">Nenhum teste aguardando revisão.</div></div>;

  return (
    <div>
      {queue.map(t=>{
        const isOwn   = t.created_by===user?.email && !user?.can_self_review;
        const isDel   = t.status==="PENDING_DELETE";
        return (
          <div className={`review-card${isDel?" delete-req":""}`} key={t.test_id}>
            <div className="review-card-head">
              {t.category&&<span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--text-subtle)"}}>{t.category}/</span>}
              <span className="review-card-title">{t.test_name}</span>
              <TypeBadge t={t.query_type}/>
              <span className="badge badge-draft" style={{fontSize:10}}>v{t.version}</span>
              {isDel&&<span className="badge badge-pdelete">🗑 Solicitação de Exclusão</span>}
            </div>
            <div className="review-meta">
              <div className="meta-item"><span className="meta-lbl">Solicitado por</span><span className="meta-val">{t.created_by}</span></div>
              <div className="meta-item"><span className="meta-lbl">Área</span><span className="meta-val">{t.responsible_area||"—"}</span></div>
              <div className="meta-item"><span className="meta-lbl">Risco</span><span className="meta-val">{t.risco_id||"—"}</span></div>
              {!isDel&&<><div className="meta-item"><span className="meta-lbl">Threshold</span><span className="meta-val">{t.threshold}</span></div><div className="meta-item"><span className="meta-lbl">Frequência</span><span className="meta-val">{t.frequency}</span></div></>}
            </div>
            {isDel
              ? <div className="alert alert-warn">⚠️ Aprovar irá <strong>cancelar</strong> permanentemente. Rejeitar mantém o teste ativo.</div>
              : <>
                  {t.description&&<p style={{fontSize:12.5,color:"var(--text-muted)",marginBottom:10}}>{t.description}</p>}
                  {t.query_type==="PYTHON"&&t.imports&&<div className="code-preview imports" style={{marginBottom:8,maxHeight:72}}>{t.imports}</div>}
                  <div className="code-preview query" style={{marginBottom:12,maxHeight:160}}>{t.query_code}</div>
                  <RunPreviewInline test={t}/>
                </>
            }
            {isOwn&&<div className="alert alert-warn">⚠️ Você criou este teste e não pode aprová-lo.</div>}
            {rejectId===t.test_id ? (
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <div className="field" style={{flex:1}}>
                  <label className="field-label">Motivo<span className="req">*</span></label>
                  <input className="field-input" value={reason} onChange={e=>setReason(e.target.value)} autoFocus/>
                </div>
                <button className="btn btn-danger btn-sm" onClick={()=>doReject(t)} disabled={!reason.trim()||acting===t.test_id}>Confirmar</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setRid(null);setReason("");}}>Cancelar</button>
              </div>
            ):(
              <div className="review-actions">
                <button className="btn btn-danger btn-sm" disabled={isOwn||acting===t.test_id} onClick={()=>setRid(t.test_id)}>✕ {isDel?"Manter":"Rejeitar"}</button>
                <button className="btn btn-success btn-sm" disabled={isOwn||acting===t.test_id} onClick={()=>doApprove(t)}>{acting===t.test_id?"...":(isDel?"✓ Confirmar Exclusão":"✓ Aprovar e Ativar")}</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── MultiStatusSelect ────────────────────────────────────────────────────────
const ALL_STATUSES = [
  {value:"ACTIVE",         label:"Ativo"},
  {value:"DRAFT",          label:"Rascunho"},
  {value:"UNDER_REVIEW",   label:"Em Revisão"},
  {value:"PAUSED",         label:"Pausado"},
  {value:"PENDING_DELETE", label:"Excl. Pendente"},
  {value:"REJECTED",       label:"Rejeitado"},
  {value:"CANCELLED",      label:"Cancelado"},
];

function MultiStatusSelect({selected, onChange}) {
  const [open, setOpen] = useState(false);
  const ref = useRef();

  useEffect(()=>{
    const fn = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  function toggle(val) {
    if (selected.includes(val)) {
      onChange(selected.filter(s => s !== val));
    } else {
      onChange([...selected, val]);
    }
  }

  const label = selected.length === 0
    ? "Todos os status"
    : selected.length === 1
      ? (ALL_STATUSES.find(s => s.value === selected[0])?.label || selected[0])
      : `${selected.length} status`;

  return (
    <div style={{position:"relative"}} ref={ref}>
      <button
        className="sel-filter"
        onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:8,minWidth:160,cursor:"pointer",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--rs)",padding:"6px 10px",fontFamily:"var(--font)",fontSize:13,color:"var(--text)"}}
      >
        <span style={{flex:1,textAlign:"left"}}>{label}</span>
        <span style={{color:"var(--text-subtle)",fontSize:10}}>▼</span>
      </button>
      {open && (
        <div style={{position:"absolute",top:"100%",left:0,zIndex:50,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--rs)",boxShadow:"var(--sh)",minWidth:180,marginTop:3,padding:"4px 0"}}>
          <div
            style={{padding:"7px 12px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid var(--border)",marginBottom:4}}
            onClick={()=>onChange([])}
          >
            <span style={{width:14,height:14,border:"1px solid var(--border-strong)",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:selected.length===0?"var(--primary)":"transparent",background:selected.length===0?"var(--primary-soft)":"white"}}>
              {selected.length===0?"✓":""}
            </span>
            <span style={{color:selected.length===0?"var(--primary)":"var(--text-muted)"}}>Todos os status</span>
          </div>
          {ALL_STATUSES.map(s=>{
            const checked = selected.includes(s.value);
            return (
              <div
                key={s.value}
                style={{padding:"7px 12px",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:8,transition:"background .1s"}}
                onClick={()=>toggle(s.value)}
                onMouseEnter={e=>e.currentTarget.style.background="var(--surface-alt)"}
                onMouseLeave={e=>e.currentTarget.style.background=""}
              >
                <span style={{width:14,height:14,border:`1px solid ${checked?"var(--primary)":"var(--border-strong)"}`,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",background:checked?"var(--primary)":"white",flexShrink:0}}>
                  {checked?"✓":""}
                </span>
                <span style={{color:checked?"var(--primary)":"var(--text)"}}>
                  {s.label}
                </span>
                {checked && <span style={{marginLeft:"auto",width:6,height:6,borderRadius:"50%",background:"var(--primary)"}}/>}
              </div>
            );
          })}
          {selected.length > 0 && (
            <div style={{borderTop:"1px solid var(--border)",marginTop:4,padding:"6px 12px"}}>
              <button
                className="btn btn-ghost btn-xs"
                style={{width:"100%",justifyContent:"center"}}
                onClick={()=>onChange([])}
              >
                Limpar seleção
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── TestList ──────────────────────────────────────────────────────────────────
function TestList({tests, loading, onSelect, onNew}) {
  const [search,   setSearch]   = useState("");
  const [statuses, setStatuses] = useState(["ACTIVE","PAUSED","UNDER_REVIEW"]);
  const filtered = tests.filter(t=>{
    const q=search.toLowerCase();
    const ms=(t.test_name||"").toLowerCase().includes(q)||(t.responsible_area||"").toLowerCase().includes(q)||(t.category||"").toLowerCase().includes(q);
    const ss=statuses.length===0 || statuses.includes(t.status);
    return ms && ss;
  });
  return (
    <div className="table-card">
      <div className="table-toolbar">
        <span className="table-title">Testes de Auditoria</span>
        <input className="inp-search" placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <MultiStatusSelect selected={statuses} onChange={setStatuses}/>
        <button className="btn btn-primary" onClick={onNew}>+ Novo Teste</button>
      </div>
      {loading?<div className="loading"><div className="spinner"/>Carregando...</div>:
       filtered.length===0?<div className="empty"><div className="empty-icon">🔎</div><div className="empty-title">Nenhum teste encontrado</div></div>:(
        <table>
          <thead><tr><th>Teste</th><th>Área</th><th>Tipo</th><th>Freq.</th><th>Última Execução</th><th>Status do Teste</th><th>Achados</th><th>Status</th></tr></thead>
          <tbody>
            {filtered.map(t=>(
              <tr key={t.test_id} onClick={()=>onSelect(t)}>
                <td>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div className="cell-name">{t.test_name}</div>

                  </div>
                  {t.category&&<div className="cell-sub">{t.category}</div>}
                </td>
                <td style={{fontSize:12.5,color:"var(--text-muted)"}}>{t.responsible_area||"—"}</td>
                <td><TypeBadge t={t.query_type}/></td>
                <td className="cell-mono">{t.frequency}</td>
                <td className="cell-mono">{fmt(t.last_run)}</td>
                <td><AlertStatusBadge status={t.last_alert_status}/></td>
                <td>{t.last_incident_count!=null?<span className="cell-count" style={{color:t.last_incident_count>0?"var(--danger)":"var(--success)"}}>{t.last_incident_count}</span>:<span style={{color:"var(--text-subtle)"}}>—</span>}</td>
                <td><StatusBadge s={t.status}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      )}
    </div>
  );
}

// ── BarChart ──────────────────────────────────────────────────────────────────
function BarChart({data, labelKey, valueKey, color="#4f46e5"}) {
  const ref = useRef();
  useEffect(()=>{
    if(!ref.current||!data?.length) return;
    const ctx = ref.current.getContext("2d");
    const ch = new Chart(ctx, {
      type:"bar",
      data:{labels:data.map(d=>d[labelKey]),datasets:[{data:data.map(d=>d[valueKey]),backgroundColor:color+"bb",borderColor:color,borderWidth:1,borderRadius:4}]},
      options:{
        indexAxis:"y",responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.x} teste(s)`}}},
        scales:{
          x:{ticks:{stepSize:1,font:{family:"JetBrains Mono",size:11}},grid:{color:"rgba(0,0,0,.05)"},beginAtZero:true},
          y:{ticks:{font:{family:"Inter",size:11.5},maxRotation:0},grid:{display:false}},
        },
      },
    });
    return ()=>ch.destroy();
  },[JSON.stringify(data)]);
  if(!data?.length) return <div className="empty" style={{padding:"24px"}}><div className="empty-sub">Sem dados</div></div>;
  const h = Math.min(380, Math.max(160, data.length * 30));
  return <div style={{position:"relative",height:h+"px",width:"100%"}}><canvas ref={ref}/></div>;
}

// ── DonutChart ────────────────────────────────────────────────────────────────
function DonutChart({cleared, flagged, error=0}) {
  const ref  = useRef();
  const total = cleared + flagged + error;
  useEffect(()=>{
    if(!ref.current) return;
    const ctx = ref.current.getContext("2d");
    const ch = new Chart(ctx, {
      type:"doughnut",
      data:{
        labels:["Cleared","Flagged","Error"],
        datasets:[{
          data:[cleared,flagged,error],
          backgroundColor:["#05966966","#dc262666","#d9770666"],
          borderColor:["#059669","#dc2626","#d97706"],
          borderWidth:2,
        }],
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{position:"bottom",labels:{font:{family:"Inter",size:11.5},padding:12,boxWidth:12}},
          tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed} (${Math.round(c.parsed/Math.max(1,total)*100)}%)`}},
        },
        cutout:"62%",
      },
    });
    return ()=>ch.destroy();
  },[cleared,flagged,error]);
  return <div style={{position:"relative",height:"220px",width:"220px",margin:"0 auto"}}><canvas ref={ref}/></div>;
}

// ── ViewChartCanvas ───────────────────────────────────────────────────────────
// Separate component so canvas ref is always mounted before the Chart.js effect fires
function ViewChartCanvas({data}) {
  const ref = useRef();
  useEffect(() => {
    if (!ref.current) return;
    const colors = PALETTE_COLORS[data.palette] || PALETTE_COLORS.blue;
    const ctx    = ref.current.getContext("2d");
    let cfg;

    if (data.chart_type === "pie") {
      cfg = {
        type: "doughnut",
        data: {
          labels: data.labels,
          datasets: [{
            data: (data.datasets[0] || {data:[]}).data,
            backgroundColor: data.labels.map((_,i) => colors[i % colors.length] + "cc"),
            borderColor:     data.labels.map((_,i) => colors[i % colors.length]),
            borderWidth: 1,
          }],
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{position:"bottom", labels:{font:{family:"Inter",size:11},boxWidth:11,padding:10}},
          },
          cutout:"52%",
        },
      };
    } else {
      const isH = data.chart_type === "bar_h";
      const isL = data.chart_type === "line";
      cfg = {
        type: isL ? "line" : "bar",
        data: {
          labels: data.labels,
          datasets: data.datasets.map((ds, i) => {
            const c = colors[i % colors.length];
            return {
              label: ds.label, data: ds.data,
              backgroundColor: isL ? c + "33" : c + "cc",
              borderColor: c, borderWidth: isL ? 2 : 1,
              borderRadius: isL ? 0 : 4,
              tension: isL ? 0.3 : 0,
              fill: isL && data.datasets.length === 1,
              pointRadius: isL ? 3 : 0,
              pointHoverRadius: isL ? 5 : 0,
            };
          }),
        },
        options: {
          indexAxis: isH ? "y" : "x",
          responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{display: data.datasets.length > 1, position:"bottom", labels:{font:{family:"Inter",size:11},boxWidth:11,padding:10}},
          },
          scales:{
            x:{ticks:{font:{family:"Inter",size:10.5}, maxRotation: isH ? 0 : 40, maxTicksLimit:12}, grid:{color:"rgba(0,0,0,.04)"}},
            y:{ticks:{font:{family:"Inter",size:10.5}}, grid:{color:"rgba(0,0,0,.04)"}, beginAtZero:true},
          },
        },
      };
    }

    const chart = new Chart(ctx, cfg);
    return () => chart.destroy();
  }, [JSON.stringify(data)]);

  const h = data.chart_type === "bar_h"
    ? Math.min(440, Math.max(160, (data.labels || []).length * 26))
    : 240;

  return (
    <div style={{position:"relative", height:h+"px", width:"100%"}}>
      <canvas ref={ref}/>
    </div>
  );
}

// ── ChartCard ─────────────────────────────────────────────────────────────────
function ChartCard({chart, isFirst, isLast, onEdit, onDelete, onMove}) {
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);

  function load() {
    setLoading(true); setError(null);
    api.getChartData(chart.chart_id)
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message || "Erro ao carregar gráfico"); setLoading(false); });
  }

  useEffect(() => { load(); }, [chart.chart_id, chart.updated_at]);

  const isFull   = chart.width === "full";
  const colors   = PALETTE_COLORS[(data?.palette) || "blue"] || PALETTE_COLORS.blue;

  return (
    <div className="dash-card" style={{gridColumn: isFull ? "span 2" : "span 1", minHeight:200}}>
      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10}}>
        <span style={{flex:1,fontSize:13,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{chart.title}</span>
        <span style={{fontSize:9.5,fontFamily:"var(--mono)",color:"var(--text-subtle)",
          background:"var(--surface-alt)",padding:"1px 5px",borderRadius:3,flexShrink:0,marginRight:4}}>
          {isFull ? "↔ full" : "½"}
        </span>
        <button className="btn btn-ghost btn-xs" onClick={()=>onMove("up")}  disabled={isFirst} title="Mover para cima"  style={{padding:"3px 6px",minWidth:24}}>↑</button>
        <button className="btn btn-ghost btn-xs" onClick={()=>onMove("down")} disabled={isLast}  title="Mover para baixo" style={{padding:"3px 6px",minWidth:24}}>↓</button>
        <button className="btn btn-ghost btn-xs" onClick={onEdit}   title="Editar gráfico"  style={{padding:"3px 7px"}}>✎</button>
        <button className="btn btn-ghost btn-xs" onClick={onDelete} title="Excluir gráfico" style={{padding:"3px 7px",color:"var(--danger)"}}>✕</button>
      </div>

      {loading ? (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:140}}>
          <div className="spinner"/>
        </div>
      ) : error ? (
        <div>
          <div className="val-error" style={{fontSize:11}}>{error}</div>
          <button className="btn btn-ghost btn-xs" onClick={load} style={{marginTop:6}}>↺ Tentar novamente</button>
        </div>
      ) : data && data.chart_type === "kpi" ? (
        <div style={{textAlign:"center",padding:"12px 0 4px"}}>
          <div style={{fontSize:52,fontWeight:700,lineHeight:1,color:colors[0],letterSpacing:"-2px"}}>
            {typeof data.kpi_value === "number" ? data.kpi_value.toLocaleString("pt-BR") : (data.kpi_value ?? 0)}
          </div>
          <div style={{fontSize:11.5,color:"var(--text-subtle)",marginTop:6,fontFamily:"var(--mono)"}}>{data.kpi_label || "Total"}</div>
        </div>
      ) : !data || (data.labels || []).length === 0 ? (
        <div className="empty" style={{padding:"24px 0"}}><div className="empty-sub">Sem dados no período</div></div>
      ) : (
        <ViewChartCanvas data={data}/>
      )}
    </div>
  );
}

// ── ViewPage ──────────────────────────────────────────────────────────────────
function ViewPage({view, tests}) {
  const [charts,       setCharts]       = useState([]);
  const [loadingCharts,setLoadingCharts]= useState(true);
  const [chartModal,   setChartModal]   = useState(null); // null | {mode:"add"} | {mode:"edit", chart}

  function loadCharts() {
    setLoadingCharts(true);
    api.listViewCharts(view.view_id)
      .then(r => { setCharts(Array.isArray(r) ? r : []); setLoadingCharts(false); })
      .catch(() => setLoadingCharts(false));
  }

  useEffect(() => { loadCharts(); }, [view.view_id]);

  function handleDelete(chart) {
    if (!window.confirm(`Excluir o gráfico "${chart.title}"?`)) return;
    api.deleteChart(chart.chart_id)
      .then(loadCharts)
      .catch(e => alert("Erro ao excluir: " + (e.message || e)));
  }

  function handleMove(chart, dir) {
    api.moveChart(chart.chart_id, dir).then(loadCharts).catch(()=>{});
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <button className="btn btn-primary btn-sm" onClick={()=>setChartModal({mode:"add"})}>
          + Adicionar Gráfico
        </button>
      </div>

      {loadingCharts ? (
        <div className="loading"><div className="spinner"/>Carregando gráficos...</div>
      ) : charts.length === 0 ? (
        <div className="empty" style={{padding:"48px 0"}}>
          <div style={{fontSize:32,marginBottom:8}}>📊</div>
          <div style={{fontWeight:600,marginBottom:4}}>Nenhum gráfico ainda</div>
          <div className="empty-sub">Clique em "Adicionar Gráfico" para começar</div>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {charts.map((c, idx) => (
            <ChartCard
              key={c.chart_id}
              chart={c}
              isFirst={idx === 0}
              isLast={idx === charts.length - 1}
              onEdit={()=>setChartModal({mode:"edit", chart: c})}
              onDelete={()=>handleDelete(c)}
              onMove={dir=>handleMove(c, dir)}
            />
          ))}
        </div>
      )}

      {chartModal && (
        <ChartEditorModal
          tests={tests}
          chart={chartModal.mode === "edit" ? chartModal.chart : null}
          onClose={()=>setChartModal(null)}
          onSave={async body => {
            if (chartModal.mode === "edit") {
              await api.updateChart(chartModal.chart.chart_id, body);
            } else {
              await api.addChart(view.view_id, body);
            }
            setChartModal(null);
            loadCharts();
          }}
        />
      )}
    </div>
  );
}

// ── ViewNameModal — create / rename a view (page) ─────────────────────────────
function ViewNameModal({initialTitle, isRename, onClose, onSave}) {
  const [title,  setTitle]  = useState(initialTitle || "");
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState("");

  async function handleSave() {
    setErr("");
    if (!title.trim()) { setErr("O nome da view é obrigatório."); return; }
    setSaving(true);
    try {
      await onSave(title.trim());
      onClose();
    } catch(e) {
      setErr(e.message || "Erro ao salvar.");
      setSaving(false);
    }
  }

  function handleKey(e) { if (e.key === "Enter") handleSave(); }

  return (
    <div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:440}}>
        <div className="modal-head">
          <div className="modal-title">{isRename ? "Renomear View" : "Nova View"}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="field">
            <label className="field-label">Nome <span className="req">*</span></label>
            <input className="field-input" value={title} onChange={e=>setTitle(e.target.value)}
              onKeyDown={handleKey} placeholder="ex: Disponibilidade de Sistemas" autoFocus/>
          </div>
          {!isRename && (
            <div style={{marginTop:8,fontSize:11.5,color:"var(--text-subtle)"}}>
              Você poderá adicionar gráficos após criar a view. Limite: 20 views, 16 gráficos por view.
            </div>
          )}
          {err && <div className="val-error" style={{marginTop:8}}>⚠️ {err}</div>}
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving || !title.trim()}>
            {saving ? "Salvando..." : isRename ? "Renomear" : "Criar View →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── ChartEditorModal — add / edit a chart widget ──────────────────────────────
function ChartEditorModal({tests, chart, onClose, onSave}) {
  // chart=null → adding new; chart=object → editing existing
  const cfg = chart ? (typeof chart.config === "string" ? JSON.parse(chart.config || "{}") : (chart.config || {})) : {};

  // ALL state at top — never inside conditions/IIFEs
  const [title,      setTitle]      = useState(chart?.title      || "");
  const [chartType,  setChartType]  = useState(chart?.chart_type || "bar");
  const [width,      setWidth]      = useState(chart?.width      || "half");
  const [testId,     setTestId]     = useState(chart?.test_id    || "");
  const [cols,       setCols]       = useState(null);
  const [colsLoad,   setColsLoad]   = useState(false);
  const [xAxis,      setXAxis]      = useState(cfg.x_axis        || "ArchiveDate");
  const [yAgg,       setYAgg]       = useState(cfg.y_aggregation || "COUNT");
  const [yCol,       setYCol]       = useState(cfg.y_column      || "");
  const [groupBy,    setGroupBy]    = useState(cfg.group_by      || "");
  const [topNSeries, setTopNSeries] = useState(String(cfg.top_n_series || "8"));
  const [dateRange,  setDateRange]  = useState(cfg.date_range    || "30d");
  const [palette,    setPalette]    = useState(cfg.palette       || "blue");
  const [saving,     setSaving]     = useState(false);
  const [err,        setErr]        = useState("");

  const isEdit     = !!chart;
  const activeTests = tests.filter(t => t.status === "ACTIVE");
  const needsYCol  = yAgg !== "COUNT";

  // Load columns when testId changes
  useEffect(() => {
    if (!testId) { setCols(null); return; }
    setColsLoad(true);
    api.getIncidentCols(testId)
      .then(r => { setCols(r); setColsLoad(false); })
      .catch(() => { setCols(null); setColsLoad(false); });
  }, [testId]);

  // Clear y_column when switching to COUNT
  useEffect(() => {
    if (yAgg === "COUNT") setYCol("");
  }, [yAgg]);

  async function handleSave() {
    setErr("");
    if (!title.trim())            { setErr("O título é obrigatório."); return; }
    if (!testId)                  { setErr("Selecione um teste."); return; }
    if (needsYCol && !yCol)       { setErr("Selecione a coluna Y para a agregação escolhida."); return; }
    setSaving(true);
    const body = {
      title: title.trim(), chart_type: chartType, test_id: testId, width,
      config: {
        x_axis: xAxis,
        y_aggregation: yAgg,
        y_column: yCol || null,
        group_by: groupBy || null,
        top_n_series: parseInt(topNSeries) || 8,
        date_range: dateRange,
        palette,
      },
    };
    try {
      await onSave(body);
    } catch(e) {
      setErr(e.message || "Erro ao salvar gráfico.");
      setSaving(false);
    }
  }

  return (
    <div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-head">
          <div>
            <div className="modal-title">{isEdit ? "Editar Gráfico" : "Novo Gráfico"}</div>
            <div className="modal-sub">{isEdit ? "Altere as configurações do gráfico" : "Configure e adicione à view atual"}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          {/* Title + Width */}
          <div className="form-grid" style={{marginBottom:14}}>
            <div className="field">
              <label className="field-label">Título <span className="req">*</span></label>
              <input className="field-input" value={title} onChange={e=>setTitle(e.target.value)}
                placeholder="ex: Disponibilidade por Sistema" autoFocus/>
            </div>
            <div className="field">
              <label className="field-label">Largura</label>
              <div style={{display:"flex",gap:8,marginTop:2}}>
                {[["half","½ Metade"],["full","↔ Largura Total"]].map(([v,l])=>(
                  <button key={v} type="button" onClick={()=>setWidth(v)} style={{
                    flex:1, padding:"8px 10px", cursor:"pointer", borderRadius:"var(--rs)", fontSize:12,
                    border:`2px solid ${width===v?"var(--primary)":"var(--border)"}`,
                    background: width===v?"var(--primary-soft)":"var(--surface)",
                    color: width===v?"var(--primary)":"var(--text-muted)", fontWeight: width===v?600:400,
                  }}>{l}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Chart type + Test */}
          <div className="form-grid" style={{marginBottom:14}}>
            <div className="field">
              <label className="field-label">Tipo de Gráfico <span className="req">*</span></label>
              <select className="field-select" value={chartType} onChange={e=>setChartType(e.target.value)}>
                <option value="bar">Barras Verticais</option>
                <option value="bar_h">Barras Horizontais</option>
                <option value="line">Linha (tendência)</option>
                <option value="pie">Pizza / Donut</option>
                <option value="kpi">KPI (número único)</option>
              </select>
            </div>
            <div className="field">
              <label className="field-label">Fonte de Dados <span className="req">*</span></label>
              <select className="field-select" value={testId} onChange={e=>setTestId(e.target.value)}>
                <option value="">Selecionar teste...</option>
                {activeTests.map(t=><option key={t.test_id} value={t.test_id}>{t.test_name}</option>)}
              </select>
            </div>
          </div>

          {/* Axis / aggregation config */}
          {testId && (
            colsLoad ? (
              <div className="loading" style={{padding:"8px 0"}}><div className="spinner"/> Carregando colunas...</div>
            ) : (
              <div className="form-grid" style={{marginBottom:14}}>
                {chartType !== "kpi" && (
                  <div className="field">
                    <label className="field-label">Eixo X</label>
                    <select className="field-select" value={xAxis} onChange={e=>setXAxis(e.target.value)}>
                      <option value="ArchiveDate">Data de Execução</option>
                      {(cols?.categorical_cols || []).map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                )}
                <div className="field">
                  <label className="field-label">Agregação Y</label>
                  <select className="field-select" value={yAgg} onChange={e=>setYAgg(e.target.value)}>
                    <option value="COUNT">COUNT — total de linhas</option>
                    <option value="SUM">SUM — soma</option>
                    <option value="AVG">AVG — média</option>
                    <option value="MIN">MIN — mínimo</option>
                    <option value="MAX">MAX — máximo</option>
                  </select>
                </div>
                {needsYCol && (
                  <div className="field">
                    <label className="field-label">Coluna Y <span className="req">*</span></label>
                    <select className="field-select" value={yCol} onChange={e=>setYCol(e.target.value)}>
                      <option value="">Selecionar coluna...</option>
                      {(cols?.numeric_cols || []).map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                )}
                {chartType !== "kpi" && chartType !== "pie" && (
                  <div className="field">
                    <label className="field-label">Agrupar por (multi-série)</label>
                    <select className="field-select" value={groupBy} onChange={e=>setGroupBy(e.target.value)}>
                      <option value="">Sem agrupamento</option>
                      {(cols?.categorical_cols || []).map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                )}
                {groupBy && chartType !== "kpi" && (
                  <div className="field">
                    <label className="field-label">Top N séries</label>
                    <select className="field-select" value={topNSeries} onChange={e=>setTopNSeries(e.target.value)}>
                      <option value="5">5</option>
                      <option value="8">8</option>
                      <option value="10">10</option>
                      <option value="20">20</option>
                    </select>
                  </div>
                )}
              </div>
            )
          )}

          {/* Date range + Palette */}
          <div className="form-grid" style={{marginBottom:14}}>
            <div className="field">
              <label className="field-label">Período</label>
              <select className="field-select" value={dateRange} onChange={e=>setDateRange(e.target.value)}>
                <option value="7d">Últimos 7 dias</option>
                <option value="30d">Últimos 30 dias</option>
                <option value="90d">Últimos 90 dias</option>
                <option value="all">Todo o histórico</option>
              </select>
            </div>
            <div className="field">
              <label className="field-label">Paleta de Cores</label>
              <div style={{display:"flex",gap:8,marginTop:2}}>
                {PALETTE_META.map(p=>(
                  <button key={p.value} type="button" onClick={()=>setPalette(p.value)} style={{
                    flex:1, display:"flex", flexDirection:"column", gap:5, padding:"7px 10px",
                    cursor:"pointer", borderRadius:"var(--rs)",
                    border:`2px solid ${palette===p.value?"var(--primary)":"var(--border)"}`,
                    background: palette===p.value?"var(--primary-soft)":"var(--surface)",
                  }}>
                    <div style={{display:"flex",gap:3,justifyContent:"center"}}>
                      {p.colors.map((c,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:c}}/>)}
                    </div>
                    <span style={{fontSize:10,fontFamily:"var(--mono)",textAlign:"center",whiteSpace:"nowrap",
                      color:palette===p.value?"var(--primary)":"var(--text-muted)",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {p.label}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          </div>

          {err && <div className="val-error" style={{marginTop:8}}>⚠️ {err}</div>}
        </div>

        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave}
            disabled={saving || !title.trim() || !testId || (needsYCol && !yCol)}>
            {saving ? "Salvando..." : isEdit ? "Salvar Alterações" : "Adicionar Gráfico →"}
          </button>
        </div>
      </div>
    </div>
  );
}

                <tbody>
                  {dash.tests_with_open_entries.map((r,i)=>(
                    <tr key={i}>
                      <td className="cell-name">{r.test_name}</td>
                      <td style={{fontSize:12.5,color:"var(--text-muted)"}}>{r.responsible_area}</td>

                    </tr>

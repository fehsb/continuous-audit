<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auditoria Contínua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    :root{
      --bg:#f0f2f8;--surface:#fff;--surface-alt:#f7f8fc;
      --border:#e2e8f0;--border-strong:#cbd5e1;
      --text:#0f172a;--text-muted:#64748b;--text-subtle:#94a3b8;
      --primary:#4f46e5;--primary-h:#4338ca;--primary-soft:#eef2ff;--primary-b:#c7d2fe;
      --success:#059669;--success-soft:#ecfdf5;--success-b:#6ee7b7;
      --warning:#d97706;--warning-soft:#fffbeb;--warning-b:#fcd34d;
      --danger:#dc2626;--danger-soft:#fef2f2;--danger-b:#fca5a5;
      --purple:#7c3aed;--purple-soft:#f5f3ff;--purple-b:#c4b5fd;
      --sidebar:#1e1b4b;--sidebar-w:220px;--sidebar-w-collapsed:52px;
      --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
      --r:10px;--rs:6px;--rl:14px;
      --sh-sm:0 1px 3px rgba(0,0,0,.07);--sh:0 4px 16px rgba(0,0,0,.09);--sh-lg:0 12px 40px rgba(0,0,0,.13);
    }
    body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
    /* ── Layout ── */
    .app{display:flex;height:100vh;overflow:hidden}
    /* ── Sidebar ── */
    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;transition:width .2s ease;overflow:hidden}
    .sidebar.collapsed{width:var(--sidebar-w-collapsed)}
    .sidebar-top{display:flex;align-items:center;padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.07);gap:8px;min-height:54px}
    .hamburger{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:4px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s}
    .hamburger:hover{color:#fff;background:rgba(255,255,255,.1)}
    .brand-text{overflow:hidden;transition:opacity .2s,width .2s}
    .brand-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;white-space:nowrap}
    .sidebar.collapsed .brand-text{opacity:0;width:0;overflow:hidden}
    .nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px}
    .nav-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:var(--rs);font-size:13px;font-weight:400;color:rgba(255,255,255,.58);background:none;border:none;cursor:pointer;text-align:left;transition:all .15s;white-space:nowrap;overflow:hidden}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
    .nav-item.active{background:rgba(255,255,255,.13);color:#fff;font-weight:500}
    .nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
    .nav-label{overflow:hidden;transition:opacity .2s,width .2s;white-space:nowrap}
    .sidebar.collapsed .nav-label{opacity:0;width:0}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:20px;flex-shrink:0;transition:opacity .2s}
    .sidebar.collapsed .nav-badge{opacity:0}
    .sidebar-footer{padding:8px 6px;border-top:1px solid rgba(255,255,255,.06)}
    .user-pill{padding:7px 10px;border-radius:var(--rs);background:rgba(255,255,255,.06);overflow:hidden}
    .user-email{font-size:11px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:opacity .2s}
    .sidebar.collapsed .user-email{opacity:0}
    /* ── Main ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{height:54px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
    .topbar-title{font-size:15px;font-weight:600;color:var(--text);flex:1;letter-spacing:-.3px}
    .topbar-meta{font-family:var(--mono);font-size:11px;color:var(--text-subtle)}
    .content{flex:1;overflow-y:auto;padding:24px}
    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:var(--rs);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;line-height:1}
    .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{background:var(--primary-h)}.btn-primary:disabled{opacity:.45;cursor:not-allowed}
    .btn-ghost{background:transparent;color:var(--text-muted);border-color:var(--border)}.btn-ghost:hover{background:var(--surface-alt);color:var(--text)}.btn-ghost:disabled{opacity:.4;cursor:not-allowed}
    .btn-danger{background:transparent;color:var(--danger);border-color:var(--danger-b)}.btn-danger:hover{background:var(--danger-soft)}.btn-danger:disabled{opacity:.4;cursor:not-allowed}
    .btn-success{background:var(--success);color:#fff}.btn-success:hover{filter:brightness(1.08)}.btn-success:disabled{opacity:.4;cursor:not-allowed}
    .btn-warning{background:transparent;color:var(--warning);border-color:var(--warning-b)}.btn-warning:hover{background:var(--warning-soft)}
    .btn-sm{padding:5px 11px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:500;border:1px solid transparent;white-space:nowrap}
    .badge-active{background:var(--success-soft);color:var(--success);border-color:var(--success-b)}
    .badge-draft{background:var(--surface-alt);color:var(--text-muted);border-color:var(--border)}
    .badge-review{background:var(--warning-soft);color:var(--warning);border-color:var(--warning-b)}
    .badge-paused{background:var(--purple-soft);color:var(--purple);border-color:var(--purple-b)}
    .badge-pdelete,.badge-rejected{background:var(--danger-soft);color:var(--danger);border-color:var(--danger-b)}
    .badge-cancelled{background:var(--surface-alt);color:var(--text-subtle);border-color:var(--border)}
    .badge-cleared{background:var(--success-soft);color:var(--success);border-color:var(--success-b)}
    .badge-flagged{background:var(--danger-soft);color:var(--danger);border-color:var(--danger-b)}
    .badge-error{background:var(--warning-soft);color:var(--warning);border-color:var(--warning-b)}
    .badge-sql{background:var(--primary-soft);color:var(--primary);border-color:var(--primary-b)}
    .badge-python{background:var(--purple-soft);color:var(--purple);border-color:var(--purple-b)}
    /* ── Stats ── */
    .stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--sh-sm)}
    .stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
    .stat-card.c-indigo::after{background:var(--primary)}.stat-card.c-slate::after{background:#64748b}
    .stat-card.c-amber::after{background:#f59e0b}.stat-card.c-emerald::after{background:var(--success)}
    .stat-card.c-rose::after{background:var(--danger)}.stat-card.c-orange::after{background:#ea580c}
    .stat-label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)}
    .stat-val{font-size:28px;font-weight:700;line-height:1;margin-top:7px;letter-spacing:-1px}
    .stat-card.c-indigo .stat-val{color:var(--primary)}.stat-card.c-slate .stat-val{color:#475569}
    .stat-card.c-amber .stat-val{color:#d97706}.stat-card.c-emerald .stat-val{color:var(--success)}
    .stat-card.c-rose .stat-val{color:var(--danger)}.stat-card.c-orange .stat-val{color:#ea580c}
    .stat-sub{font-size:10.5px;color:var(--text-subtle);margin-top:2px}
    /* ── Table ── */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-sm)}
    .table-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 16px;border-bottom:1px solid var(--border)}
    .table-title{font-size:13.5px;font-weight:600;flex:1;letter-spacing:-.2px}
    .inp-search{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:6px 11px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;width:190px}
    .inp-search:focus{border-color:var(--primary)}.inp-search::placeholder{color:var(--text-subtle)}
    .sel-filter{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;cursor:pointer}
    table{width:100%;border-collapse:collapse}
    thead tr{border-bottom:1px solid var(--border);background:var(--surface-alt)}
    th{padding:9px 13px;text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);font-weight:500}
    td{padding:11px 13px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    tbody tr{cursor:pointer;transition:background .1s}
    tbody tr:hover td{background:#f8faff}
    .cell-name{font-weight:600;letter-spacing:-.1px}
    .cell-sub{font-size:10px;color:var(--text-subtle);font-family:var(--mono);margin-top:2px}
    .cell-mono{font-family:var(--mono);font-size:11.5px;color:var(--text-muted)}
    .cell-count{font-family:var(--mono);font-size:13px;font-weight:600}
    /* ── Modal ── */
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .15s ease}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:700px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--sh-lg);animation:su .2s ease}
    .modal-lg{width:860px}.modal-xl{width:1020px}
    @keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
    .modal-title{font-size:16px;font-weight:700;color:var(--text);flex:1;letter-spacing:-.4px}
    .modal-sub{font-size:11px;color:var(--text-subtle);margin-top:3px}
    .modal-body{flex:1;overflow-y:auto;padding:20px 22px}
    .modal-foot{padding:13px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:9px;background:var(--surface-alt);border-radius:0 0 var(--rl) var(--rl)}
    /* ── Form ── */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
    .field{display:flex;flex-direction:column;gap:5px}
    .field-label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);font-weight:500}
    .req{color:#ef4444;margin-left:2px}
    .field-input,.field-select{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:8px 11px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;width:100%;transition:border-color .15s}
    .field-input:focus,.field-select:focus{border-color:var(--primary);background:#fff}
    .field-input::placeholder{color:var(--text-subtle)}
    .field-textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:8px 11px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;resize:vertical;min-height:64px;width:100%;transition:border-color .15s}
    .field-textarea:focus{border-color:var(--primary);background:#fff}
    .inp-prefix-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--bg)}
    .inp-prefix-wrap:focus-within{border-color:var(--primary)}
    .inp-prefix{padding:8px 10px;background:var(--border);color:var(--text-muted);font-family:var(--mono);font-size:11px;border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0}
    .inp-prefix-input{border:none;background:transparent;padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;flex:1;min-width:0}
    /* ── Code sections ── */
    .code-section{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:10px}
    .code-sec-hd{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--surface-alt);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
    .code-tag{padding:1px 7px;border-radius:10px;font-size:10px;font-weight:500}
    .code-area{border:none;background:#fafbff;padding:11px 13px;font-family:var(--mono);font-size:12.5px;outline:none;resize:vertical;width:100%;line-height:1.75;min-height:56px}
    .code-area.imports{color:#6d28d9;min-height:56px}
    .code-area.query{color:#065f46;min-height:180px}
    .code-area:focus{background:#f0f9ff}
    .code-preview{background:#f8fafc;border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;font-family:var(--mono);font-size:12px;line-height:1.75;max-height:220px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
    .code-preview.imports{color:#6d28d9}.code-preview.query{color:#065f46}
    /* ── Combobox ── */
    .combobox{position:relative}
    .cb-dropdown{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);box-shadow:var(--sh);max-height:200px;overflow-y:auto;margin-top:3px}
    .cb-item{padding:8px 12px;cursor:pointer;font-size:13px;transition:background .1s}
    .cb-item:hover,.cb-item.focused{background:var(--primary-soft);color:var(--primary)}
    .cb-empty{padding:10px 12px;font-size:12px;color:var(--text-subtle);font-style:italic}
    /* ── Misc ── */
    .type-toggle{display:inline-flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
    .type-opt{padding:7px 20px;font-family:var(--mono);font-size:12px;background:transparent;color:var(--text-muted);border:none;cursor:pointer;transition:all .15s}
    .type-opt.active{background:var(--primary);color:#fff}
    .divider{height:1px;background:var(--border);margin:16px 0}
    .sec-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:11px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .val-error{background:var(--danger-soft);border:1px solid var(--danger-b);border-radius:var(--rs);padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--danger);margin-top:7px;line-height:1.6}
    .val-ok{background:var(--success-soft);border:1px solid var(--success-b);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:var(--success);margin-top:7px}
    .alert{padding:9px 13px;border-radius:var(--rs);font-size:12.5px;margin-bottom:12px}
    .alert-warn{background:var(--warning-soft);color:var(--warning);border:1px solid var(--warning-b)}
    .alert-info{background:var(--primary-soft);color:var(--primary);border:1px solid var(--primary-b)}
    .toggle-row{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;width:fit-content}
    .toggle-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--primary);cursor:pointer}
    /* ── Tabs ── */
    .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;background:var(--surface)}
    .tab{padding:9px 13px;border:none;background:none;font-size:13px;font-family:var(--font);cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
    /* ── Review ── */
    .review-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px;box-shadow:var(--sh-sm);transition:box-shadow .15s}
    .review-card:hover{box-shadow:var(--sh)}.review-card.delete-req{border-color:var(--danger-b);background:#fff8f8}
    .review-card-head{display:flex;align-items:center;gap:8px;margin-bottom:11px}
    .review-card-title{font-size:13.5px;font-weight:700;flex:1}
    .review-meta{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:11px}
    .meta-item{display:flex;flex-direction:column;gap:2px}
    .meta-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-subtle)}
    .meta-val{font-size:13px;font-weight:500}
    .review-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:11px}
    /* ── KV detail ── */
    .kv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
    .kv-item{display:flex;flex-direction:column;gap:4px}
    .kv-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-subtle)}
    .kv-val{font-size:13px;font-weight:500}
    /* ── Timeline ── */
    .timeline{position:relative;padding-left:18px}
    .timeline::before{content:'';position:absolute;left:5px;top:6px;bottom:0;width:1px;background:var(--border)}
    .tl-item{position:relative;margin-bottom:14px}
    .tl-dot{position:absolute;left:-16px;top:4px;width:8px;height:8px;border-radius:50%;border:2px solid var(--surface);background:var(--primary)}
    .tl-dot.neg{background:var(--danger)}.tl-dot.warn{background:var(--warning)}
    .tl-row{display:flex;align-items:center}
    .tl-type{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--primary)}
    .tl-type.neg{color:var(--danger)}.tl-type.warn{color:var(--warning)}
    .tl-date{font-family:var(--mono);font-size:10.5px;color:var(--text-subtle);margin-left:auto}
    .tl-by{font-size:11px;color:var(--text-muted);margin-top:1px}
    .tl-comment{font-size:11px;color:var(--danger);font-style:italic;margin-top:2px}
    /* ── Achados (expandable rows) ── */
    .achados-row{cursor:pointer;transition:background .1s}
    .achados-row:hover td{background:#f8faff}
    .achados-row.expanded td{background:var(--primary-soft)}
    .achados-expand{padding:0!important;border-bottom:1px solid var(--border)}
    .achados-inner{padding:12px 16px;background:#fafbff;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
    .achado-field{display:flex;flex-direction:column;gap:3px}
    .achado-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-subtle)}
    .achado-val{font-size:12.5px;color:var(--text);word-break:break-word;line-height:1.5}
    /* ── Preview table ── */
    .prev-wrap{overflow-x:auto;max-height:160px;border-radius:var(--rs);border:1px solid var(--border);margin-top:6px}
    .prev-wrap table{font-family:var(--mono);font-size:11px}
    .prev-wrap th{background:var(--bg);padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text-muted);font-size:10px;white-space:nowrap}
    .prev-wrap td{padding:4px 10px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
    .prev-wrap tr:last-child td{border-bottom:none}
    /* ── Toast ── */
    .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:7px}
    .toast{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 15px;font-size:13px;color:var(--text);box-shadow:var(--sh);min-width:240px;animation:su .2s ease}
    .toast.success{border-left:3px solid var(--success)}.toast.error{border-left:3px solid var(--danger)}.toast.warning{border-left:3px solid var(--warning)}
    /* ── Loading/empty ── */
    .loading{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text-subtle);font-family:var(--mono);font-size:12px;gap:9px}
    .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:52px 24px;color:var(--text-muted)}
    .empty-icon{font-size:34px;margin-bottom:10px;opacity:.4}.empty-title{font-size:14px;font-weight:600;color:var(--text-muted);margin-bottom:4px}.empty-sub{font-size:12px;color:var(--text-subtle)}
    /* ── Dashboard ── */
    .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh-sm)}
    .dash-card-title{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}
    .dash-filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-sm)}
    .filter-group{display:flex;flex-direction:column;gap:4px}
    .filter-label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
    .filter-input{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-family:var(--font);font-size:12.5px;color:var(--text);outline:none;min-width:140px}
    .filter-input:focus{border-color:var(--primary)}
    .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
    .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
    .kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .kpi-card.c-blue::after{background:#3b82f6}.kpi-card.c-indigo::after{background:var(--primary)}
    .kpi-card.c-slate::after{background:#64748b}.kpi-card.c-green::after{background:var(--success)}
    .kpi-card.c-red::after{background:var(--danger)}.kpi-card.c-amber::after{background:#f59e0b}
    .kpi-label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted)}
    .kpi-val{font-size:26px;font-weight:700;line-height:1;margin-top:6px;letter-spacing:-1px}
    .kpi-card.c-blue .kpi-val{color:#3b82f6}.kpi-card.c-indigo .kpi-val{color:var(--primary)}
    .kpi-card.c-slate .kpi-val{color:#64748b}.kpi-card.c-green .kpi-val{color:var(--success)}
    .kpi-card.c-red .kpi-val{color:var(--danger)}.kpi-card.c-amber .kpi-val{color:#d97706}
    .open-entries-table{width:100%}
    .open-entries-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12.5px}
    thead.sticky th{position:sticky;top:0;z-index:10}
    .open-entries-table tr:last-child td{border-bottom:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API ──────────────────────────────────────────────────────────────────────
async function req(method, path, body) {
  const c = new AbortController(), t = setTimeout(() => c.abort(), 35000);
  try {
    const r = await fetch(`/api${path}`, {
      method, signal: c.signal,
      headers: body ? {"Content-Type":"application/json"} : undefined,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!r.ok) { const e = await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||"Erro inesperado"); }
    return r.json();
  } catch(e) {
    if (e.name==="AbortError") throw new Error("timeout — warehouse iniciando, tente novamente");
    throw e;
  } finally { clearTimeout(t); }
}
const api = {
  getUser:       ()          => req("GET",  "/user"),
  getStats:      ()          => req("GET",  "/stats"),
  listTests:     ()          => req("GET",  "/tests"),
  getRisks:      ()          => req("GET",  "/risks"),
  getAreas:      ()          => req("GET",  "/areas"),
  getDashboard:  (p)         => req("GET",  "/dashboard?" + new URLSearchParams(p).toString()),
  getHistory:    (id)        => req("GET",  `/tests/${id}/history`),
  getExecutions: (id)        => req("GET",  `/tests/${id}/executions`),
  getIncidents:  (id, p)     => req("GET",  `/tests/${id}/incidents?` + new URLSearchParams(Object.fromEntries(Object.entries(p||{}).filter(([,v])=>v))).toString()),
  createTest:    (d,s)       => req("POST", `/tests?submit=${!!s}`, d),
  editTest:      (id,d,s)    => req("PUT",  `/tests/${id}?submit=${!!s}`, d),
  runPreview:    (d)         => req("POST", "/run-preview", d),
  approve:       (id)        => req("POST", `/tests/${id}/approve`),
  reject:        (id,r)      => req("POST", `/tests/${id}/reject`, {reason:r}),
  pause:         (id)        => req("POST", `/tests/${id}/pause`),
  activate:      (id)        => req("POST", `/tests/${id}/activate`),
  requestDelete:     (id, reason)   => req("POST",   `/tests/${id}/request-delete`, {reason}),
  listSuppressions:  (id)           => req("GET",    `/tests/${id}/suppressions`),
  createSuppression: (id, body)     => req("POST",   `/tests/${id}/suppressions`, body),
  deleteSuppress:    (sid)          => req("DELETE",  `/suppressions/${sid}`),
  searchEntries:     (q, openOnly)  => req("GET",    `/risk-entries?q=${encodeURIComponent(q||"")}&open_only=${openOnly!==false}`),
  getHashes:         (id)           => req("GET",    `/tests/${id}/hashes`),
  markFP:            (body)         => req("POST",   "/false-positives", body),
  unmarkFP:          (fp_id)        => req("DELETE",  `/false-positives/${fp_id}`),
  listFPs:           (testId)       => req("GET",     `/tests/${testId}/false-positives`),
  getAllFPs:         ()             => req("GET",      "/false-positives"),
  getFPHistory:     ()             => req("GET",      "/false-positives/history"),
  // Dashboard views (pages/tabs)
  getDashViews:    ()              => req("GET",    "/dashboard-views"),
  createDashView:  (body)          => req("POST",   "/dashboard-views", body),
  updateDashView:  (id, body)      => req("PUT",    `/dashboard-views/${id}`, body),
  deleteDashView:  (id)            => req("DELETE", `/dashboard-views/${id}`),
  // Dashboard charts (widgets within a view)
  listViewCharts:  (viewId)        => req("GET",    `/dashboard-views/${viewId}/charts`),
  addChart:        (viewId, body)  => req("POST",   `/dashboard-views/${viewId}/charts`, body),
  updateChart:     (chartId, body) => req("PUT",    `/dashboard-charts/${chartId}`, body),
  deleteChart:     (chartId)       => req("DELETE", `/dashboard-charts/${chartId}`),
  moveChart:       (chartId, dir)  => req("POST",   `/dashboard-charts/${chartId}/move`, {direction: dir}),
  getChartData:    (chartId)       => req("GET",    `/dashboard-charts/${chartId}/data`),
  getIncidentCols: (testId)        => req("GET",    `/tests/${testId}/incident-columns`),
};

// ── Validation ───────────────────────────────────────────────────────────────
const SQL_BLK = ["DROP","CREATE","INSERT","DELETE","ALTER","UPDATE","TRUNCATE","REPLACE","MERGE","OVERWRITE"];
const PY_BLK  = ["os.system","subprocess","__import__","open(","eval(","exec(",".write.","saveAsTable","insertInto"];
function localValidate(type, imp, code) {
  const src = `${imp||""}\n${code||""}`.toUpperCase();
  return (type==="SQL"?SQL_BLK:PY_BLK).filter(k=>src.includes(k.toUpperCase()));
}

// ── Display ──────────────────────────────────────────────────────────────────
const S_LABEL = {ACTIVE:"Ativo",DRAFT:"Rascunho",UNDER_REVIEW:"Em Revisão",PAUSED:"Pausado",CANCELLED:"Cancelado",REJECTED:"Rejeitado",PENDING_DELETE:"Excl. Pendente"};
const S_CLS   = {ACTIVE:"active",DRAFT:"draft",UNDER_REVIEW:"review",PAUSED:"paused",CANCELLED:"cancelled",REJECTED:"rejected",PENDING_DELETE:"pdelete"};
const R_LABEL = {PASSED:"Cleared",FAILED:"Flagged",ERROR:"Error"};

const ALERT_META = {
  sem_achados:   {label:"Sem Achados",        icon:"✅", cls:"sem_achados"},
  novo_achado:   {label:"Novo Achado",         icon:"🆕", cls:"com_achados"},
  persistente:   {label:"Achado Persistente",  icon:"🔁", cls:"draft"},
  reincidente:   {label:"Risco Reincidente",   icon:"⚠️", cls:"com_achados"},
  em_tratamento: {label:"Em Tratamento",       icon:"🔕", cls:"review"},
  erro:          {label:"Erro",                icon:"❌", cls:"erro"},
  nunca_rodou:   {label:"—",                   icon:"",   cls:"draft"},
};

function AlertStatusBadge({status}) {
  if (!status) return <span style={{color:"var(--text-subtle)"}}>—</span>;
  const m = ALERT_META[status] || {label:status, icon:"", cls:"draft"};
  return <span className={`badge badge-${m.cls}`} style={{gap:4}}>{m.icon} {m.label}</span>;
}
const R_CLS   = {PASSED:"cleared",FAILED:"flagged",ERROR:"error"};
const CHG_LBL = {CREATED:"✦ Criado",EDITED:"✎ Editado",SUBMITTED_FOR_REVIEW:"→ Submetido",APPROVED:"✓ Aprovado",REJECTED:"✕ Rejeitado",PAUSED:"⏸ Pausado",REACTIVATED:"▶ Reativado",CANCELLED:"⊗ Cancelamento Aprovado"};
const fmt = dt => dt ? new Date(dt).toLocaleString("pt-BR",{dateStyle:"short",timeStyle:"short"}) : "—";

const StatusBadge = ({s}) => <span className={`badge badge-${S_CLS[s]||"draft"}`}>{S_LABEL[s]||s}</span>;
const ResultBadge = ({r}) => r ? <span className={`badge badge-${R_CLS[r]||"draft"}`}>{R_LABEL[r]||r}</span> : <span style={{color:"var(--text-subtle)"}}>—</span>;
const TypeBadge   = ({t}) => <span className={`badge badge-${(t||"").toLowerCase()}`}>{t}</span>;

// ── Color Palettes (for custom dashboard views) ──────────────────────────────
const PALETTE_COLORS = {
  blue:  ["#3b82f6","#6366f1","#8b5cf6","#0ea5e9","#06b6d4","#14b8a6","#22c55e","#84cc16"],
  warm:  ["#ef4444","#f97316","#f59e0b","#eab308","#e11d48","#ec4899","#d97706","#dc2626"],
  earth: ["#059669","#0d9488","#0891b2","#10b981","#6ee7b7","#34d399","#1d4ed8","#7c3aed"],
};
const PALETTE_META = [
  {value:"blue",  label:"Azul / Roxo",           colors:["#3b82f6","#6366f1","#8b5cf6","#0ea5e9"]},
  {value:"warm",  label:"Quente (Verm/Âmbar)",   colors:["#ef4444","#f97316","#f59e0b","#e11d48"]},
  {value:"earth", label:"Natural (Verde/Teal)",   colors:["#059669","#0d9488","#10b981","#0891b2"]},
];

// ── Toast ────────────────────────────────────────────────────────────────────
const Toasts = ({toasts}) => (
  <div className="toast-wrap">
    {toasts.map(t=>(
      <div key={t.id} className={`toast ${t.type}`}>
        {t.type==="success"?"✅":t.type==="error"?"❌":"⚠️"} {t.msg}
      </div>
    ))}
  </div>
);

// ── RiskCombobox ─────────────────────────────────────────────────────────────
function RiskCombobox({value, onChange, risks}) {
  // risks can be: array | {error, data:[]} | []
  const risksArr  = Array.isArray(risks) ? risks : (risks?.data || []);
  const risksErr  = risks?.error || null;

  const [q, setQ]         = useState("");
  const [open, setOpen]   = useState(false);
  const [fi, setFi]       = useState(0);
  const [typing, setTyping] = useState(false);
  const ref               = useRef();

  // Sync display label when not actively typing
  useEffect(() => {
    if (!typing && value) {
      const found = risksArr.find(r => r.RiskId === value);
      setQ(found ? `${found.RiskId} — ${found.RiskTitle}` : value);
    } else if (!typing && !value) {
      setQ("");
    }
  }, [value, risksArr, typing]);

  // Filter: when typing use query, when just opened show all
  const filtered = risksArr.filter(r => {
    if (!q || !typing) return true;
    const s = q.toLowerCase();
    return r.RiskId?.toLowerCase().includes(s) || r.RiskTitle?.toLowerCase().includes(s);
  }).slice(0, 60);

  useEffect(() => {
    const fn = e => {
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false);
        setTyping(false);
      }
    };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  function select(r) {
    onChange(r.RiskId);
    setQ(`${r.RiskId} — ${r.RiskTitle}`);
    setOpen(false);
    setTyping(false);
    setFi(0);
  }

  if (risksErr) {
    return (
      <div>
        <input className="field-input" value={value||""} onChange={e=>onChange(e.target.value)}
          placeholder="Digite o ID do risco manualmente..."/>
        <div style={{fontSize:10.5,color:"var(--danger)",marginTop:3}}>
          ⚠️ Tabela de riscos indisponível — {risksErr.slice(0,80)}
        </div>
      </div>
    );
  }

  return (
    <div className="combobox" ref={ref}>
      <input
        className="field-input"
        placeholder={risksArr.length===0?"Carregando riscos...":"Buscar por ID ou título do risco..."}
        value={q}
        onChange={e => {
          setQ(e.target.value);
          setTyping(true);
          onChange(e.target.value);
          setOpen(true);
          setFi(0);
        }}
        onFocus={() => { setOpen(true); setTyping(false); }}
        onBlur={() => setTimeout(()=>{ setTyping(false); }, 200)}
        onKeyDown={e => {
          if (e.key==="ArrowDown"){e.preventDefault();setFi(f=>Math.min(f+1,filtered.length-1));}
          if (e.key==="ArrowUp")  {e.preventDefault();setFi(f=>Math.max(f-1,0));}
          if (e.key==="Enter" && filtered[fi]) { e.preventDefault(); select(filtered[fi]); }
          if (e.key==="Escape") { setOpen(false); setTyping(false); }
        }}
      />
      {open && risksArr.length > 0 && (
        <div className="cb-dropdown">
          {filtered.length===0
            ? <div className="cb-empty">Nenhum risco encontrado para "{q}"</div>
            : filtered.map((r,i) => (
                <div key={r.RiskId} className={`cb-item${i===fi?" focused":""}`} onMouseDown={()=>select(r)}>
                  <span style={{fontFamily:"var(--mono)",fontSize:10.5,color:"var(--primary)",marginRight:8,flexShrink:0}}>{r.RiskId}</span>
                  <span style={{overflow:"hidden",textOverflow:"ellipsis"}}>{r.RiskTitle}</span>
                </div>
              ))
          }
        </div>
      )}
    </div>
  );
}

// ── AreaSelect ───────────────────────────────────────────────────────────────
function AreaSelect({value, onChange, areas}) {
  // areas can be: array | {error, data:[]} | []
  const areasArr = Array.isArray(areas) ? areas : (areas?.data || []);
  const areasErr = areas?.error || null;

  if (areasErr) {
    return (
      <div>
        <input className="field-input" value={value||""} onChange={e=>onChange(e.target.value)}
          placeholder="Digite a área manualmente..."/>
        <div style={{fontSize:10.5,color:"var(--danger)",marginTop:3}}>
          ⚠️ Tabela de áreas indisponível — {areasErr.slice(0,80)}
        </div>
      </div>
    );
  }

  return (
    <select className="field-select" value={value||""} onChange={e=>onChange(e.target.value)}>
      <option value="">{areasArr.length===0?"Carregando áreas...":"Selecionar área..."}</option>
      {areasArr.map(a=><option key={a.Area} value={a.Area}>{a.Area}</option>)}
    </select>
  );
}

// ── TestEditor ───────────────────────────────────────────────────────────────
const EMPTY = {test_name:"",output_table_suffix:"",description:"",responsible_area:"",risco_id:"",threshold:0,frequency:"DAILY",query_type:"SQL",imports:"",query_code:"",category:"",should_activate_channel:true};

function validateForm(form) {
  const errs = {};
  if (!form.test_name?.trim())           errs.test_name         = "Obrigatório";
  if (!form.output_table_suffix?.trim()) errs.output_table      = "Obrigatório";
  if (!form.responsible_area?.trim())    errs.responsible_area  = "Obrigatório";
  if (!form.risco_id?.trim() || form.risco_id === "N/A") errs.risco_id = "Obrigatório";
  if (!form.description?.trim())         errs.description       = "Obrigatório";
  if (!form.query_code?.trim())          errs.query_code        = "Obrigatório";
  return errs;
}

function TestEditor({test, risks, areas, onClose, onSave, saving}) {
  const isEdit = !!test?.test_id;
  const initSuffix = isEdit ? (test.output_table||"").replace(/^tb_incidents_/,"") : "";
  const [form, setForm]       = useState(isEdit ? {...test, output_table_suffix:initSuffix} : {...EMPTY});
  const [hits, setHits]       = useState([]);
  const [fieldErrs, setFieldErrs] = useState({});
  const [submitErr, setSubmitErr] = useState("");
  const [preview, setPreview] = useState(null);
  const [tested, setTested]   = useState(false);
  const [testLoading, setTestLoading] = useState(false);

  const set = (k,v) => {
    setForm(f=>({...f,[k]:v}));
    // clear field error when user edits
    setFieldErrs(e=>({...e,[k]:undefined}));
    if (["query_type","imports","query_code"].includes(k)) { setTested(false); setPreview(null); }
  };

  useEffect(()=>setHits(localValidate(form.query_type,form.imports,form.query_code)),[form.query_type,form.imports,form.query_code]);

  async function runPreview() {
    // Validate query before running
    if (!form.query_code?.trim()) {
      setPreview({success:false, error:"Escreva o código antes de validar."});
      return;
    }
    if (hits.length) {
      setPreview({success:false, error:`Remova os padrões bloqueados antes de testar: ${hits.join(", ")}`});
      return;
    }
    setTestLoading(true);
    setPreview(null);
    const r = await api.runPreview({query_type:form.query_type, imports:form.imports, query_code:form.query_code});
    setPreview(r);
    setTested(r.success);
    setTestLoading(false);
  }

  function handleSubmit(doSubmit) {
    setSubmitErr("");
    if (doSubmit) {
      const errs = validateForm(form);
      if (Object.keys(errs).length) {
        setFieldErrs(errs);
        setSubmitErr("Preencha todos os campos obrigatórios antes de submeter.");
        return;
      }
      if (!tested) {
        setSubmitErr("Valide a query com sucesso antes de submeter para revisão.");
        return;
      }
      if (hits.length) {
        setSubmitErr(`Corrija os padrões bloqueados: ${hits.join(", ")}`);
        return;
      }
    }
    onSave({...form, output_table:`tb_incidents_${form.output_table_suffix}`}, doSubmit);
  }

  return (
    <div className="overlay" onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-head">
          <div>
            <div className="modal-title">{isEdit?"Editar Teste":"Novo Teste de Auditoria"}</div>
            <div className="modal-sub">{isEdit?`v${form.version} · ${form.test_id}`:"Configure o teste e valide a query antes de submeter"}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          <div className="form-grid" style={{marginBottom:13}}>
            <div className="field">
              <label className="field-label">Nome do Teste<span className="req">*</span></label>
              <input
                className="field-input"
                value={form.test_name}
                onChange={e=>set("test_name",e.target.value)}
                placeholder="ex: download-large-results"
                disabled={isEdit&&form.status==="ACTIVE"}
                style={{
                  ...(isEdit&&form.status==="ACTIVE"?{background:"var(--surface-alt)",color:"var(--text-muted)",cursor:"not-allowed"}:{}),
                  ...(fieldErrs.test_name?{borderColor:"var(--danger)"}:{})
                }}/>
              {isEdit&&form.status==="ACTIVE"&&<span style={{fontSize:10.5,color:"var(--text-subtle)"}}>🔒 Nome não pode ser alterado em testes ativos</span>}
              {fieldErrs.test_name&&<span style={{fontSize:11,color:"var(--danger)"}}>⚠ {fieldErrs.test_name}</span>}
            </div>
            <div className="field">
              <label className="field-label">Tabela de Achados<span className="req">*</span></label>
              {isEdit&&form.status==="ACTIVE" ? (
                <input className="field-input" value={`tb_incidents_${form.output_table_suffix}`} disabled
                  style={{background:"var(--surface-alt)",color:"var(--text-muted)",cursor:"not-allowed",fontFamily:"var(--mono)",fontSize:12}}/>
              ) : (
                <div className="inp-prefix-wrap" style={fieldErrs.output_table?{borderColor:"var(--danger)"}:{}}>
                  <span className="inp-prefix">tb_incidents_</span>
                  <input className="inp-prefix-input" value={form.output_table_suffix} onChange={e=>set("output_table_suffix",e.target.value.replace(/[^a-z0-9_]/g,""))} placeholder="categoria_nome"/>
                </div>
              )}
              {isEdit&&form.status==="ACTIVE"&&<span style={{fontSize:10.5,color:"var(--text-subtle)"}}>🔒 Tabela não pode ser alterada em testes ativos</span>}
              {fieldErrs.output_table&&<span style={{fontSize:11,color:"var(--danger)"}}>⚠ {fieldErrs.output_table}</span>}
            </div>
            <div className="field">
              <label className="field-label">Área Responsável<span className="req">*</span></label>
              <div style={fieldErrs.responsible_area?{borderRadius:"var(--rs)",outline:"1px solid var(--danger)"}:{}}>
                <AreaSelect value={form.responsible_area} onChange={v=>set("responsible_area",v)} areas={areas}/>
              </div>
              {fieldErrs.responsible_area&&<span style={{fontSize:11,color:"var(--danger)"}}>⚠ {fieldErrs.responsible_area}</span>}
            </div>
            <div className="field">
              <label className="field-label">ID do Risco<span className="req">*</span></label>
              <div style={fieldErrs.risco_id?{borderRadius:"var(--rs)",outline:"1px solid var(--danger)"}:{}}>
                <RiskCombobox value={form.risco_id} onChange={v=>set("risco_id",v)} risks={risks}/>
              </div>
              {fieldErrs.risco_id&&<span style={{fontSize:11,color:"var(--danger)"}}>⚠ {fieldErrs.risco_id}</span>}

                <span style={{fontSize:11,color:"var(--text-subtle)"}}>

              <div style={{padding:"20px",display:"flex",alignItems:"center",gap:10,color:"var(--text-muted)",fontSize:13}}>

              preview.success ? (

                    <>
                      <div style={{fontWeight:600,fontSize:13,color:"var(--success)",marginBottom:10}}>

                        <div className="prev-wrap">
                          <table>
                            <thead><tr>{preview.columns.map(c=><th key={c}>{c}</th>)}</tr></thead>
                            <tbody>{preview.sample.map((row,i)=>(

                    <div style={{color:"var(--success)",fontSize:13}}>✓ {preview.message}</div>

                <div style={{padding:"14px 16px",background:"var(--danger-soft)"}}>
                  <div style={{fontWeight:600,fontSize:13,color:"var(--danger)",marginBottom:6}}>✗ Erro — corrija antes de submeter</div>

        </div>

        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose} disabled={saving}>Cancelar</button>
          <button className="btn btn-ghost" onClick={()=>handleSubmit(false)} disabled={saving}>{saving?"Salvando...":"Salvar Rascunho"}</button>
          <button
            className="btn btn-primary"
            onClick={()=>handleSubmit(true)}

          </button>
        </div>
      </div>
    </div>
  );

// ── ExecTable ─────────────────────────────────────────────────────────────────
function AlertBadge({exec: e}) {
  if (e.IsSupressed)  return <span className="badge badge-review"  style={{fontSize:10}}>🔕 Em Tratamento</span>;
  if (e.IsRecurrent)  return <span className="badge badge-flagged" style={{fontSize:10}}>⚠️ Risco Reincidente</span>;
  if (e.IsContinued)  return <span className="badge badge-draft"   style={{fontSize:10}}>🔁 Achado Persistente</span>;
  if (e.TestResult==="FAILED") return <span className="badge badge-flagged" style={{fontSize:10}}>🆕 Novo Achado</span>;
  return null;
}

function ExecTable({execs}) {
  const [expanded, setExpanded] = useState(null);
  return (
    <table>
      <thead><tr><th>Data</th><th>Resultado</th><th>Alerta</th><th>Achados</th><th>Threshold</th><th>Duração</th><th>Erro</th></tr></thead>
      <tbody>
        {execs.map((e,i)=>(
          <React.Fragment key={i}>
            <tr>
              <td className="cell-mono">{fmt(e.ExecutionDate)}</td>
              <td><ResultBadge r={e.TestResult}/></td>
              <td><AlertBadge exec={e}/></td>
              <td><span className="cell-count" style={{color:e.IncidentCount>0?"var(--danger)":"var(--success)"}}>{e.IncidentCount??0}</span></td>
              <td className="cell-mono">{e.Threshold}</td>
              <td className="cell-mono">{e.ExecutionTimeSec?.toFixed(1)}s</td>
              <td>
                {e.ErrorMessage
                  ? <button className="btn btn-xs btn-danger" onClick={()=>setExpanded(expanded===i?null:i)}>{expanded===i?"▲ Fechar":"▼ Ver erro"}</button>
                  : <span style={{color:"var(--text-subtle)"}}>—</span>}
              </td>
            </tr>
            {expanded===i&&e.ErrorMessage&&(
              <tr><td colSpan={7} style={{padding:"0 14px 12px",background:"var(--danger-soft)"}}>
                <pre style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--danger)",whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.7,padding:"10px 0"}}>{e.ErrorMessage}</pre>
              </td></tr>
            )}
          </React.Fragment>
        ))}
      </tbody>
    </table>
  );
}

// ── FPMarkModal ────────────────────────────────────────────────────────────────
function FPMarkModal({row, columns, onConfirm, onClose}) {
  const [selected, setSelected] = useState([]);   // column names, max 3
  const [note,     setNote]     = useState("");

  const cols = (columns || []).filter(c => c !== "ArchiveDate" && !c.startsWith("_"));

  function toggle(c) {
    setSelected(sel => sel.includes(c)
      ? sel.filter(x => x !== c)
      : (sel.length >= 3 ? sel : [...sel, c]));
  }

  // Preserve column order as it appears in the table
  const criteria = cols
    .filter(c => selected.includes(c))
    .map(c => ({column: c, value: row[c] == null ? "" : String(row[c])}));
  const canConfirm = criteria.length >= 1 && note.trim();

  return (
    <div className="overlay" style={{zIndex:300}} onMouseDown={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width:580,maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
        <div className="modal-head">
          <div>
            <div className="modal-title">⚑ Marcar como Falso Positivo</div>
            <div className="modal-sub">Escolha de 1 a 3 campos que identificam este falso positivo</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body" style={{overflowY:"auto"}}>
          <div style={{fontSize:12.5,color:"var(--text-muted)",marginBottom:12,lineHeight:1.55}}>

            campos selecionados tiverem exatamente estes valores — independente da data de execução
            ou dos demais campos.
          </div>

          {/* Column picker */}
          <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:6,maxHeight:300,
                       overflowY:"auto",border:"1px solid var(--border)",borderRadius:"var(--rs)",padding:8}}>
            {cols.length === 0 ? (
              <div style={{fontSize:12,color:"var(--text-subtle)",padding:"8px"}}>Nenhuma coluna disponível.</div>
            ) : cols.map(c => {
              const on = selected.includes(c);

                <label key={c} style={{display:"flex",alignItems:"flex-start",gap:9,padding:"7px 9px",

                    background:on?"var(--primary-soft)":"transparent",opacity:disabled?0.4:1,

                  <div style={{flex:1,minWidth:0}}>

                    <div style={{fontSize:13,color:"var(--text)",wordBreak:"break-word"}}>
                      {val !== "" ? val : <em style={{color:"var(--text-subtle)"}}>(vazio)</em>}

          <div style={{fontSize:11,color:"var(--text-subtle)",marginBottom:14,textAlign:"right"}}>
            {selected.length}/3 selecionados
          </div>

          {/* Rule preview */}
          {criteria.length > 0 && (
            <div style={{background:"var(--surface-alt)",border:"1px solid var(--border)",
                         borderRadius:"var(--rs)",padding:"10px 12px",marginBottom:14,fontSize:12.5,lineHeight:1.7}}>
              <span style={{color:"var(--text-muted)"}}>Regra: </span>

                <span key={c.column}>
                  {i>0 && <span style={{color:"var(--primary)",fontWeight:700}}> E </span>}
